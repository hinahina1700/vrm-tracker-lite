<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vrm-tracker-lite</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00ff00; font-family: sans-serif; color: white; user-select: none; }
        #canvas { width: 100vw; height: 100vh; display: block; }
        
        #video-container { position: fixed; bottom: 10px; right: 10px; width: 160px; height: 120px; border: 2px solid #555; border-radius: 4px; z-index: 10; background: #000; overflow: hidden; transition: opacity 0.2s; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: block; }
        #overlay-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        
        #taskbar { position: fixed; top: 0; left: 0; width: 100vw; background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(4px); border-bottom: 1px solid #333; z-index: 40; display: flex; flex-direction: column; padding: 6px 15px; box-sizing: border-box; font-size: 11px; gap: 6px; }
        .taskbar-row { display: flex; align-items: center; justify-content: space-between; width: 100%; flex-wrap: wrap; gap: 8px; }
        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .btn { background: #333; color: white; border: 1px solid #555; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn:hover, .btn.active { background: #444; border-color: #00ffcc; color: #00ffcc; }
        .btn-rec { border-color: #ff4444; }
        .btn-rec.active { background: #ff4444; color: white; border-color: #ff4444; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .status-item { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; background: #ff4444; border-radius: 50%; display: inline-block; }
        .status-dot.active { background: #00ffcc; box-shadow: 0 0 8px #00ffcc; }

        #drop-zone { position: fixed; top: 110px; left: 10px; padding: 15px; background: rgba(0,0,0,0.7); color: white; border: 2px dashed #aaa; border-radius: 8px; font-size: 12px; z-index: 20; text-align: center; cursor: pointer; transition: all 0.2s; display: none; } /* 不要なドロップゾーンは非表示に */
        #file-input { display: none; }

        #vrm-meta-panel { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.75); padding: 12px; border-radius: 6px; font-size: 11px; border: 1px solid #444; min-width: 180px; z-index: 20; }
        #vrm-meta-panel h4 { margin: 0 0 6px 0; color: #00ffcc; font-size: 12px; border-bottom: 1px solid #444; padding-bottom: 4px; }
        .meta-line { margin: 3px 0; color: #ddd; }

        #loading { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15,15,15,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.4s; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: #00ffcc; animation: spin 1s linear infinite; margin-bottom: 20px; }
        #progress-percent { font-size: 36px; font-weight: bold; color: #00ffcc; font-family: monospace; margin-bottom: 10px; }
        #loading-text { color: #aaa; font-size: 13px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .color-picker-wrapper { display: flex; align-items: center; gap: 4px; }
        #bg-color-input { width: 22px; height: 18px; border: 1px solid #555; padding: 0; background: none; cursor: pointer; }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/@pixiv/three-vrm@0.6.7/lib/three-vrm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.umd.js"></script>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div id="progress-percent">0%</div>
        <div id="loading-text">システム最高速度で起動中...</div>
    </div>

    <div id="taskbar">
        <div class="taskbar-row">
            <div class="controls">
                <strong>vrm-tracker-lite</strong>
                <button id="btn-switch-camera" class="btn" style="border-color:#00ffcc;">📷 カメラ切替</button>
                <button id="btn-pip" class="btn">📌 小窓化 (PiP)</button>
            </div>

            <div class="controls">
                <span style="color:#aaa;">保存:</span>
                <button id="btn-screenshot" class="btn">📸 スクショ</button>
                <button id="btn-record" class="btn btn-rec">🔴 録画開始</button>
            </div>

            <div class="controls">
                <button id="toggle-video" class="btn">カメラ枠非表示</button>
                <div class="status-item"><span id="status-dot" class="status-dot"></span><span id="status-text">準備中</span></div>
            </div>
        </div>
        
        <div class="taskbar-row" style="border-top: 1px solid #333; padding-top: 4px;">
            <div class="controls" id="track-target-buttons">
                <span style="color:#aaa;">動かす場所:</span>
                <button class="btn" data-target="face">顔のみ</button>
                <button class="btn active" data-target="body">顔＋からだ</button>
                <button class="btn" data-target="all">顔＋からだ＋て</button>
            </div>
            <div class="controls" id="expression-buttons" style="display:none;"> <span style="color:#aaa;">表情:</span>
                <button class="btn active" data-exp="auto">自動</button>
            </div>
            <div class="controls">
                <span style="color:#aaa;">背景色:</span>
                <div class="color-picker-wrapper">
                    <input type="color" id="bg-color-input" value="#00ff00">
                    <button id="btn-bg-green" class="btn" style="padding:1px 4px; font-size:10px;">緑</button>
                    <button id="btn-bg-dark" class="btn" style="padding:1px 4px; font-size:10px;">暗</button>
                </div>
            </div>
        </div>
    </div>

    <div id="vrm-meta-panel">
        <h4>公式キャラクター</h4>
        <div class="meta-line">名前: <span id="meta-name">ライト・ロボ (Lite-Robo)</span></div>
        <div class="meta-line">開発: <span id="meta-author">vrm-tracker-lite</span></div>
    </div>

    <div id="video-container">
        <video id="video" autoplay playsinline muted style="width:160px; height:120px;"></video>
        <canvas id="overlay-canvas"></canvas>
    </div>
    
    <canvas id="canvas"></canvas>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const overlayCanvas = document.getElementById('overlay-canvas');
        const ctx = overlayCanvas.getContext('2d');
        
        const loadingElement = document.getElementById('loading');
        const progressPercent = document.getElementById('progress-percent');
        const loadingText = document.getElementById('loading-text');
        
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const bgColorInput = document.getElementById('bg-color-input');

        let cameraUtils = null;
        let holistic = null;

        // 最新のランドマーク保持用
        let latestFaceLandmarks = null;
        let latestPoseLandmarks = null;
        let latestLeftHandLandmarks = null;
        let latestRightHandLandmarks = null;

        let videoDevices = [];
        let currentDeviceIndex = 0;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let trackingTarget = "body"; 

        function updateProgress(percent, text) {
            progressPercent.innerText = `${percent}%`;
            loadingText.innerText = text;
        }

        // --- Three.js 初期化 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20.0);
        camera.position.set(0.0, 1.4, 0.6);

        const initBgColor = new THREE.Color(bgColorInput.value);
        const renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true, alpha: false, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));
        renderer.setClearColor(initBgColor, 1.0);
        document.body.style.background = bgColorInput.value;

        const light = new THREE.DirectionalLight(0xffffff, 1.0);
        light.position.set(1.0, 1.0, 1.0).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0.0, 1.3, 0.0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.1;
        controls.screenSpacePanning = true; 

        // --- 🤖 公式キャラクター「ライト・ロボ」のボーンシステム定義 🤖 ---
        const robotNodes = {};
        function createOfficialAvatar() {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3c, roughness: 0.5 });
            const jointMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.7 });
            const visorMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x004433 });
            const handMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc });

            // 骨格ベース（腰から上）
            const spineNode = new THREE.Group(); spineNode.position.set(0, 0.9, 0); 
            const chestNode = new THREE.Group(); chestNode.position.set(0, 0.2, 0);
            const neckNode = new THREE.Group();  neckNode.position.set(0, 0.15, 0);
            const headNode = new THREE.Group();  headNode.position.set(0, 0.08, 0);

            // 左腕
            const leftUpperArm = new THREE.Group(); leftUpperArm.position.set(0.16, 0.12, 0);
            const leftLowerArm = new THREE.Group(); leftLowerArm.position.set(0.14, 0, 0);
            const leftHand = new THREE.Group();     leftHand.position.set(0.12, 0, 0);

            // 右腕
            const rightUpperArm = new THREE.Group(); rightUpperArm.position.set(-0.16, 0.12, 0);
            const rightLowerArm = new THREE.Group(); rightLowerArm.position.set(-0.14, 0, 0);
            const rightHand = new THREE.Group();     rightHand.position.set(-0.12, 0, 0);

            // --- メッシュの配置 ---
            // 下半身・スタンドベース
            const baseMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.08, 0.9, 16), bodyMat);
            baseMesh.position.y = 0.45;
            group.add(baseMesh);

            // お腹(Spine)
            const spineMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.04, 0.15, 16), jointMat);
            spineMesh.position.y = 0.075;
            spineNode.add(spineMesh);

            // 胸(Chest)
            const chestMesh = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.18, 0.14), bodyMat);
            chestMesh.position.y = 0.09;
            chestNode.add(chestMesh);

            // 首
            const neckMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.022, 0.08, 12), jointMat);
            neckMesh.position.y = 0.04;
            neckNode.add(neckMesh);

            // 頭(Head)
            const headMesh = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.14, 0.14), bodyMat);
            headMesh.position.y = 0.07;
            headNode.add(headMesh);
            // サンバイザー（目）
            const visor = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.035, 0.02), visorMat);
            visor.position.set(0, 0.07, 0.065);
            headNode.add(visor);

            // 左腕ビジュアル
            const luaMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.02, 0.14, 12), bodyMat);
            luaMesh.rotation.z = -Math.PI / 2; luaMesh.position.x = 0.07;
            leftUpperArm.add(luaMesh);
            const llaMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.018, 0.12, 12), bodyMat);
            llaMesh.rotation.z = -Math.PI / 2; llaMesh.position.x = 0.06;
            leftLowerArm.add(llaMesh);
            const lhMesh = new THREE.Mesh(new THREE.SphereGeometry(0.022, 12, 12), handMat);
            leftHand.add(lhMesh);

            // 右腕ビジュアル
            const ruaMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.02, 0.14, 12), bodyMat);
            ruaMesh.rotation.z = Math.PI / 2; ruaMesh.position.x = -0.07;
            rightUpperArm.add(ruaMesh);
            const rlaMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.018, 0.12, 12), bodyMat);
            rlaMesh.rotation.z = Math.PI / 2; rlaMesh.position.x = -0.06;
            rightLowerArm.add(rlaMesh);
            const rhMesh = new THREE.Mesh(new THREE.SphereGeometry(0.022, 12, 12), handMat);
            rightHand.add(rhMesh);

            // ツリー構造の結合
            group.add(spineNode);
            spineNode.add(chestNode);
            chestNode.add(neckNode);
            neckNode.add(headNode);

            chestNode.add(leftUpperArm);
            leftUpperArm.add(leftLowerArm);
            leftLowerArm.add(leftHand);

            chestNode.add(rightUpperArm);
            rightUpperArm.add(rightLowerArm);
            rightLowerArm.add(rightHand);

            scene.add(group);

            // 初期ポーズ調整 (Aポーズ)
            leftUpperArm.rotation.z = -0.4;
            rightUpperArm.rotation.z = 0.4;

            // トラッカー用にグローバル参照として保存
            robotNodes.spine = spineNode;
            robotNodes.chest = chestNode;
            robotNodes.neck = neckNode;
            robotNodes.head = headNode;
            robotNodes.leftUpperArm = leftUpperArm;
            robotNodes.leftLowerArm = leftLowerArm;
            robotNodes.leftHand = leftHand;
            robotNodes.rightUpperArm = rightUpperArm;
            robotNodes.rightLowerArm = rightLowerArm;
            robotNodes.rightHand = rightHand;
        }
        createOfficialAvatar();

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            processTrackingData();
            renderer.render(scene, camera);
        }
        animate();

        // カメラ映像に重ねるトラッキング用ドット描画
        function drawOverlay() {
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            ctx.fillStyle = "#00ffcc";
            if (latestFaceLandmarks) {
                for(let i=0; i<latestFaceLandmarks.length; i+=15) {
                    const pt = latestFaceLandmarks[i];
                    ctx.fillRect(pt.x * overlayCanvas.width - 1, pt.y * overlayCanvas.height - 1, 2, 2);
                }
            }
        }

        // Kalidokitトラッキング計算およびライト・ロボへの骨格適用
        function processTrackingData() {
            if (!latestFaceLandmarks && !latestPoseLandmarks) return;

            let riggedFace = null;
            let riggedPose = null;
            let riggedLeftHand = null;
            let riggedRightHand = null;

            // 1. 顔のトラッキング（上下反転バグを回避するため、Y軸座標変換を注入）
            try {
                if (latestFaceLandmarks && latestFaceLandmarks.length > 0) {
                    // ★【修正】Kalidokit内部の計算に合わせるため、顔のY軸反転を補正
                    const adjustedFace = latestFaceLandmarks.map(pt => ({ x: pt.x, y: 1.0 - pt.y, z: pt.z }));
                    riggedFace = Kalidokit.Face.solve(adjustedFace, { runtime: "mediapipe", video: videoElement });
                }
            } catch(e) {}

            // 2. 体のトラッキング
            try {
                if (latestPoseLandmarks && latestPoseLandmarks.length > 23) {
                    const adjustedPose = latestPoseLandmarks.map(pt => ({ x: pt.x, y: 1.0 - pt.y, z: pt.z, visibility: pt.visibility }));
                    riggedPose = Kalidokit.Pose.solve(adjustedPose, adjustedPose, { runtime: "mediapipe", video: videoElement });
                }
            } catch(e) {}

            // 3. 手のトラッキング
            try {
                if (latestLeftHandLandmarks && latestLeftHandLandmarks.length > 0) {
                    const adjustedLeft = latestLeftHandLandmarks.map(pt => ({ x: pt.x, y: 1.0 - pt.y, z: pt.z }));
                    riggedLeftHand = Kalidokit.Hand.solve(adjustedLeft, "Left");
                }
            } catch(e) {}

            try {
                if (latestRightHandLandmarks && latestRightHandLandmarks.length > 0) {
                    const adjustedRight = latestRightHandLandmarks.map(pt => ({ x: pt.x, y: 1.0 - pt.y, z: pt.z }));
                    riggedRightHand = Kalidokit.Hand.solve(adjustedRight, "Right");
                }
            } catch(e) {}

            // --- ライト・ロボの関節に回転情報を流し込む ---
            if (riggedFace) {
                // 顔の向きをそのまま適用（上下のガタつきを滑らかにするため制限を少しかける）
                robotNodes.head.rotation.set(-riggedFace.head.x * 0.8, -riggedFace.head.y, -riggedFace.head.z);
                robotNodes.neck.rotation.set(-riggedFace.head.x * 0.2, -riggedFace.head.y * 0.2, 0);
            }

            if ((trackingTarget === "body" || trackingTarget === "all") && riggedPose) {
                // 背骨、胸の傾き
                robotNodes.spine.rotation.set(-riggedPose.spine.x, -riggedPose.spine.y, -riggedPose.spine.z);
                
                // 腕の動き（肩から肘まで）
                if (riggedPose.leftUpperArm) robotNodes.leftUpperArm.rotation.set(riggedPose.leftUpperArm.x, riggedPose.leftUpperArm.y, riggedPose.leftUpperArm.z - 0.4);
                if (riggedPose.rightUpperArm) robotNodes.rightUpperArm.rotation.set(riggedPose.rightUpperArm.x, riggedPose.rightUpperArm.y, riggedPose.rightUpperArm.z + 0.4);
                
                if (riggedPose.leftLowerArm) robotNodes.leftLowerArm.rotation.set(riggedPose.leftLowerArm.x, riggedPose.leftLowerArm.y, riggedPose.leftLowerArm.z);
                if (riggedPose.rightLowerArm) robotNodes.rightLowerArm.rotation.set(riggedPose.rightLowerArm.x, riggedPose.rightLowerArm.y, riggedPose.rightLowerArm.z);
            }

            if (trackingTarget === "all") {
                // 手首のひねり・角度
                if (riggedLeftHand && riggedLeftHand.leftWrist) robotNodes.leftHand.rotation.set(riggedLeftHand.leftWrist.x, riggedLeftHand.leftWrist.y, riggedLeftHand.leftWrist.z);
                if (riggedRightHand && riggedRightHand.rightWrist) robotNodes.rightHand.rotation.set(riggedRightHand.rightWrist.x, riggedRightHand.rightWrist.y, riggedRightHand.rightWrist.z);
            }
        }

        // --- ⚙️ 一体化トラッカー（Holistic）の設定拡張初期化 ⚙️ ---
        async function initializeSystem() {
            loadingElement.style.display = 'flex';
            updateProgress(40, "統合トラッキングモジュール(Holistic)のシステム接続...");
            
            holistic = new Holistic({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`
            });

            // ★【修正】体と手のトラッキング機能を明示的に強制覚醒させる
            holistic.setOptions({
                modelComplexity: 0,
                smoothLandmarks: true,
                refineFaceLandmarks: true,
                enableSegmentation: false,
                smoothSegmentation: false,
                // ここの3つのスイッチを強制起動させることで体・手が正常に動くようになります
                enableFaceGeometry: true,
                enablePoseTracking: true,
                enableHandTracking: true 
            });

            holistic.onResults((results) => {
                latestFaceLandmarks = results.faceLandmarks || null;
                
                if (trackingTarget === "body" || trackingTarget === "all") {
                    latestPoseLandmarks = results.poseLandmarks || null;
                } else {
                    latestPoseLandmarks = null;
                }

                if (trackingTarget === "all") {
                    latestLeftHandLandmarks = results.leftHandLandmarks || null;
                    latestRightHandLandmarks = results.rightHandLandmarks || null;
                } else {
                    latestLeftHandLandmarks = null;
                    latestRightHandLandmarks = null;
                }

                if (overlayCanvas.width !== videoElement.videoWidth) {
                    overlayCanvas.width = videoElement.videoWidth;
                    overlayCanvas.height = videoElement.videoHeight;
                }
                drawOverlay();
            });

            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(d => d.kind === 'videoinput');
            } catch (e) {}

            await startCameraStream();
        }

        async function startCameraStream(deviceId = null) {
            updateProgress(85, "カメラデバイスの接続中...");
            if (cameraUtils) { await cameraUtils.stop(); }

            cameraUtils = new Camera(videoElement, {
                onFrame: async () => {
                    await holistic.send({ image: videoElement });
                },
                width: 320,
                height: 240,
                deviceId: deviceId
            });

            try {
                await cameraUtils.start();
                updateProgress(100, "システム完全起動！");
                setTimeout(() => {
                    loadingElement.style.opacity = '0';
                    setTimeout(() => loadingElement.style.display = 'none', 400);
                }, 400);
                statusDot.className = "status-dot active";
                statusText.innerText = `稼働中`;
            } catch (e) {
                updateProgress(0, "カメラが見つかりません");
            }
        }

        // --- 📝 クレジットサインを書き込む特殊合成システム 📝 ---
        function drawCreditOverlay(targetCanvas) {
            const context = targetCanvas.getContext('2d');
            context.save();
            context.font = "bold 14px sans-serif";
            context.fillStyle = "rgba(255, 255, 255, 0.85)";
            context.shadowColor = "black";
            context.shadowBlur = 4;
            context.textAlign = "right";
            // 画面の右下にしっかりクレジットを焼き付ける
            context.fillText("©hinahina17dayo / vrm-tracker-lite", targetCanvas.width - 20, targetCanvas.height - 20);
            context.restore();
        }

        // --- UIコントロールイベント ---
        document.getElementById('btn-switch-camera').addEventListener('click', async () => {
            if (videoDevices.length <= 1) return;
            currentDeviceIndex = (currentDeviceIndex + 1) % videoDevices.length;
            await startCameraStream(videoDevices[currentDeviceIndex].deviceId);
        });

        bgColorInput.addEventListener('input', (e) => {
            renderer.setClearColor(new THREE.Color(e.target.value), 1.0);
            document.body.style.background = e.target.value;
        });
        document.getElementById('btn-bg-green').addEventListener('click', () => {
            bgColorInput.value = "#00ff00";
            renderer.setClearColor(new THREE.Color("#00ff00"), 1.0);
            document.body.style.background = "#00ff00";
        });
        document.getElementById('btn-bg-dark').addEventListener('click', () => {
            bgColorInput.value = "#1a1a1a";
            renderer.setClearColor(new THREE.Color("#1a1a1a"), 1.0);
            document.body.style.background = "#1a1a1a";
        });

        // スクショ機能（クレジット付き）
        document.getElementById('btn-screenshot').addEventListener('click', () => {
            renderer.render(scene, camera);
            
            // クレジット焼き込み用の臨時キャンバスを作成
            const snapCanvas = document.createElement('canvas');
            snapCanvas.width = canvasElement.width;
            snapCanvas.height = canvasElement.height;
            const snapCtx = snapCanvas.getContext('2d');
            
            snapCtx.drawImage(canvasElement, 0, 0);
            drawCreditOverlay(snapCanvas); // クレジット追加

            const link = document.createElement('a');
            link.download = `lite_robo_${Date.now()}.png`;
            link.href = snapCanvas.toDataURL('image/png');
            link.click();
        });

        // 録画機能（クレジット付きストリームの合成）
        const recordBtn = document.getElementById('btn-record');
        recordBtn.addEventListener('click', () => {
            if (!isRecording) {
                recordedChunks = [];
                
                // 録画専用の動的合成キャンバスシステム
                const recordCanvas = document.createElement('canvas');
                recordCanvas.width = canvasElement.width;
                recordCanvas.height = canvasElement.height;
                const rCtx = recordCanvas.getContext('2d');
                
                // 毎フレーム描画をキャプチャして合成するループを構築
                function drawRecordLoop() {
                    if (!isRecording) return;
                    rCtx.drawImage(canvasElement, 0, 0);
                    drawCreditOverlay(recordCanvas); // クレジット常時焼き付け
                    requestAnimationFrame(drawRecordLoop);
                }

                isRecording = true;
                drawRecordLoop();

                mediaRecorder = new MediaRecorder(recordCanvas.captureStream(30), { mimeType: 'video/webm;codecs=vp9' });
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const link = document.createElement('a');
                    link.download = `lite_robo_movie_${Date.now()}.webm`;
                    link.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/webm' }));
                    link.click();
                };
                mediaRecorder.start();
                
                recordBtn.innerText = "⏹️ 録画停止";
                recordBtn.classList.add('active');
            } else {
                isRecording = false;
                mediaRecorder.stop();
                recordBtn.innerText = "🔴 録画開始";
                recordBtn.classList.remove('active');
            }
        });

        document.getElementById('btn-pip').addEventListener('click', async () => {
            try {
                const pipVideo = document.createElement('video');
                pipVideo.muted = true;
                pipVideo.srcObject = canvasElement.captureStream(30);
                pipVideo.play();
                pipVideo.addEventListener('loadedmetadata', async () => { await pipVideo.requestPictureInPicture(); });
            } catch (e) {}
        });

        document.getElementById('track-target-buttons').addEventListener('click', (e) => {
            if (e.target.classList.contains('btn')) {
                document.querySelectorAll('#track-target-buttons .btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                trackingTarget = e.target.getAttribute('data-target');
            }
        });

        document.getElementById('toggle-video').addEventListener('click', () => {
            const container = document.getElementById('video-container');
            container.style.opacity = container.style.opacity === '0' ? '1' : '0';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initializeSystem();
    </script>
</body>
</html>
