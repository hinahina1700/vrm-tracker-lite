<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vrm-tracker-lite</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; color: white; }
        #canvas { width: 100vw; height: 100vh; display: block; }
        #video { position: fixed; bottom: 10px; right: 10px; width: 160px; height: 120px; transform: scaleX(-1); border: 2px solid #555; border-radius: 4px; z-index: 10; background: #000; transition: opacity 0.2s; }
        
        /* タスクバー */
        #taskbar { position: fixed; top: 0; left: 0; width: 100vw; height: 35px; background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(4px); border-bottom: 1px solid #333; z-index: 40; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; font-size: 12px; }
        .controls { display: flex; align-items: center; gap: 15px; }
        .btn { background: #333; color: white; border: 1px solid #555; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn:hover { background: #444; border-color: #00ffcc; }
        .color-picker-wrapper { display: flex; align-items: center; gap: 5px; }
        #bg-color { border: none; width: 20px; height: 20px; padding: 0; background: none; cursor: pointer; }

        .status-item { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; background: #ff4444; border-radius: 50%; display: inline-block; }
        .status-dot.active { background: #00ffcc; box-shadow: 0 0 8px #00ffcc; }
        .status-dot.error { background: #ff3333; box-shadow: 0 0 8px #ff3333; }

        /* ドロップ＆クリックエリア */
        #drop-zone { position: fixed; top: 50px; left: 10px; padding: 15px; background: rgba(0,0,0,0.7); color: white; border: 2px dashed #aaa; border-radius: 8px; font-size: 12px; z-index: 20; text-align: center; cursor: pointer; transition: all 0.2s; }
        #drop-zone:hover { background: rgba(255,255,255,0.1); border-color: #fff; }
        #file-input { display: none; }

        /* アバター概要（情報表示）パネル */
        #vrm-meta-panel { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.75); padding: 12px; border-radius: 6px; font-size: 11px; border: 1px solid #444; min-width: 180px; z-index: 20; display: none; }
        #vrm-meta-panel h4 { margin: 0 0 6px 0; color: #00ffcc; font-size: 12px; border-bottom: 1px solid #444; padding-bottom: 4px; }
        .meta-line { margin: 3px 0; color: #ddd; }
        .meta-label { color: #aaa; }

        /* 操作説明表示 */
        #guide { position: fixed; top: 50px; right: 10px; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 6px; font-size: 11px; line-height: 1.4; color: #ccc; pointer-events: none; z-index: 20; }

        /* ローディング表示 */
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 16px; background: rgba(0,0,0,0.85); padding: 25px 40px; border-radius: 8px; border: 1px solid #444; pointer-events: none; z-index: 30; text-align: center; transition: opacity 0.3s; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); width: 24px; height: 24px; border-radius: 50%; border-left-color: #00ffcc; animation: spin 1s linear infinite; margin: 0 auto 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.amd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.umd.js"></script>
</head>
<body>
    <div id="taskbar">
        <div><strong>vrm-tracker-lite (Universal)</strong></div>
        <div class="controls">
            <button id="toggle-video" class="btn">カメラ非表示</button>
            <div class="color-picker-wrapper">
                <label for="bg-color">背景色:</label>
                <input type="color" id="bg-color" value="#1a1a1a">
            </div>
            <div class="status-item">
                <span id="status-dot" class="status-dot"></span>
                <span id="status-text">システム初期化中</span>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" accept=".vrm">
    <div id="drop-zone">ここにVRMファイルを<br>ドロップ または クリック</div>
    
    <div id="vrm-meta-panel">
        <h4>アバター情報</h4>
        <div class="meta-line"><span class="meta-label">名前:</span> <span id="meta-name">-</span></div>
        <div class="meta-line"><span class="meta-label">作者:</span> <span id="meta-author">-</span></div>
        <div class="meta-line"><span class="meta-label">規格:</span> <span id="meta-version">-</span></div>
    </div>

    <div id="guide">
        【表情固定ショートカット】<br>
        [1] 喜 (Happy)  [2] 怒 (Angry)  [3] 哀 (Sad)<br>
        [4] 楽 (Relaxed) [5] 驚 (Surprised) [0] 解除
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-text">カメラとAIを起動中...</div>
    </div>
    
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const loadingElement = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        
        // メタデータUI
        const metaPanel = document.getElementById('vrm-meta-panel');
        const metaName = document.getElementById('meta-name');
        const metaAuthor = document.getElementById('meta-author');
        const metaVersion = document.getElementById('meta-version');

        let currentVrm = null;
        let vrmVersion = "1.0"; // 自動判別したバージョンを保持する変数
        let currentExpressionMode = "auto";

        // --- Three.js 初期化 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20.0);
        camera.position.set(0.0, 1.4, 1.2);

        const renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));

        const light = new THREE.DirectionalLight(0xffffff, 1.0);
        light.position.set(1.0, 1.0, 1.0).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (currentVrm) { currentVrm.update(delta); }
            renderer.render(scene, camera);
        }
        animate();

        // --- VRM読み込み処理（0.0と1.0を自動判定してコンパイル） ---
        function loadVRM(url) {
            return new Promise((resolve, reject) => {
                const loader = new THREE.GLTFLoader();
                loader.crossOrigin = 'anonymous';
                
                // 0.0互換プラグインと1.0用プラグインの両方を登録（これが両対応の肝）
                loader.register((parser) => new THREE_VRM.VRM0CompatPlugin(parser));
                loader.register((parser) => new THREE_VRM.VRMLoaderPlugin(parser));
                
                if (currentVrm) {
                    scene.remove(currentVrm.scene);
                    THREE_VRM.VRMUtils.deepDispose(currentVrm.scene);
                }

                loader.load(url, (gltf) => {
                    const vrm = gltf.userData.vrm;
                    if (!vrm) {
                        reject({ code: "ERR_NOT_VRM", msg: "VRMデータの解析（パース）に失敗しました。ファイルが壊れている可能性があります。" });
                        return;
                    }
                    
                    currentVrm = vrm;
                    scene.add(vrm.scene);
                    vrm.scene.rotation.y = Math.PI; 

                    // 概要情報（メタデータ）の抽出と表示
                    displayVrmMeta(gltf, vrm);
                    
                    // カメラ位置をアバターの頭に自動合わせ
                    const head = vrm.humanoid.getBoneNode('head');
                    if(head) {
                        const headWorldPos = new THREE.Vector3();
                        head.getWorldPosition(headWorldPos);
                        camera.position.set(0.0, headWorldPos.y, 0.55);
                        camera.lookAt(0.0, headWorldPos.y, 0.0);
                    }
                    resolve(vrm);
                }, undefined, (err) => {
                    reject({ code: "ERR_LOAD_FAILED", msg: "ファイルの読み込みに失敗しました。GLTFの構造に問題があります。", detail: err });
                });
            });
        }

        // メタデータを解析して画面に描画する関数
        function displayVrmMeta(gltf, vrm) {
            // 規格バージョンの判定
            const isVrm0 = gltf.parser.json.extensions && gltf.parser.json.extensions.VRM;
            vrmVersion = isVrm0 ? "0.0" : "1.0";
            
            let name = "不明なアバター";
            let author = "不明な作者";

            if (vrmVersion === "1.0" && vrm.meta) {
                name = vrm.meta.avatarName || "未設定";
                author = vrm.meta.authors ? vrm.meta.authors.join(', ') : "未設定";
            } else if (vrmVersion === "0.0" && gltf.parser.json.extensions.VRM.meta) {
                const meta0 = gltf.parser.json.extensions.VRM.meta;
                name = meta0.title || "未設定";
                author = meta0.author || "未設定";
            }

            // UIに反映
            metaName.innerText = name;
            metaAuthor.innerText = author;
            metaVersion.innerText = `VRM ${vrmVersion}`;
            metaPanel.style.display = 'block'; // パネルを表示
        }

        // --- メインシステム初期化 ---
        async function initializeSystem() {
            const faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });

            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: false, 
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            faceMesh.onResults((results) => {
                if (!currentVrm || !results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;
                const landmarks = results.multiFaceLandmarks;
                const riggedFace = Kalidokit.Face.solve(landmarks, { runtime: "mediapipe", video: videoElement });
                if (riggedFace) {
                    const head = currentVrm.humanoid.getBoneNode('head');
                    const neck = currentVrm.humanoid.getBoneNode('neck');
                    
                    if (head) head.rotation.set(riggedFace.head.x, riggedFace.head.y, riggedFace.head.z);
                    if (neck) neck.rotation.set(riggedFace.head.x * 0.3, riggedFace.head.y * 0.3, riggedFace.head.z * 0.3);
                    
                    // 表情マネージャー（0.0形式の互換プロキシも自動カバーされます）
                    const target = currentVrm.expressionManager || currentVrm.blendShapeProxy;
                    if (target) {
                        if (currentExpressionMode === "auto") {
                            if (vrmVersion === "1.0") {
                                // VRM 1.0用の表情キー
                                target.setValue('blinkLeft', riggedFace.eye.l);
                                target.setValue('blinkRight', riggedFace.eye.r);
                                target.setValue('i', riggedFace.mouth.shape.I);
                                target.setValue('u', riggedFace.mouth.shape.U);
                                target.setValue('a', riggedFace.mouth.shape.A);
                                ['happy', 'angry', 'sad', 'relaxed', 'surprised'].forEach(exp => target.setValue(exp, 0));
                            } else {
                                // VRM 0.0用の表情キー
                                target.setValue('blink_l', riggedFace.eye.l);
                                target.setValue('blink_r', riggedFace.eye.r);
                                target.setValue('i', riggedFace.mouth.shape.I);
                                target.setValue('u', riggedFace.mouth.shape.U);
                                target.setValue('a', riggedFace.mouth.shape.A);
                                ['happy', 'angry', 'sad', 'fun', 'joy'].forEach(exp => target.setValue(exp, 0));
                            }
                        } else {
                            // 数字キー固定モード
                            const activeExp = currentExpressionMode;
                            // 0.0用にrelaxedをfunに、surprisedをjoyにマッピング変換
                            const activeExp0 = activeExp === 'relaxed' ? 'fun' : (activeExp === 'surprised' ? 'joy' : activeExp);
                            
                            if (vrmVersion === "1.0") {
                                ['happy', 'angry', 'sad', 'relaxed', 'surprised'].forEach(exp => {
                                    target.setValue(exp, exp === activeExp ? 1.0 : 0.0);
                                });
                                target.setValue('blinkLeft', riggedFace.eye.l);
                                target.setValue('blinkRight', riggedFace.eye.r);
                            } else {
                                ['happy', 'angry', 'sad', 'fun', 'joy'].forEach(exp => {
                                    target.setValue(exp, exp === activeExp0 ? 1.0 : 0.0);
                                });
                                target.setValue('blink_l', riggedFace.eye.l);
                                target.setValue('blink_r', riggedFace.eye.r);
                            }
                        }
                    }
                }
            });

            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => { await faceMesh.send({ image: videoElement }); },
                width: 320,
                height: 240
            });

            try {
                await cameraUtils.start();
                hideLoading();
                setSystemStatus("active", "準備完了。VRMを入れてください。");
            } catch (error) {
                console.error(error);
                hideLoading();
                setSystemStatus("error", "ERR_CAMERA_BLOCKED: カメラの起動に失敗しました。");
            }
        }

        function hideLoading() {
            loadingElement.style.opacity = '0';
            setTimeout(() => loadingElement.style.display = 'none', 300);
        }

        function setSystemStatus(type, text) {
            statusDot.className = "status-dot " + type;
            statusText.innerText = text;
        }

        initializeSystem();

        // --- 拡張UIコントロールのイベント ---
        const toggleVideoBtn = document.getElementById('toggle-video');
        toggleVideoBtn.addEventListener('click', () => {
            if (videoElement.style.opacity === '0') {
                videoElement.style.opacity = '1';
                toggleVideoBtn.innerText = "カメラ非表示";
            } else {
                videoElement.style.opacity = '0';
                toggleVideoBtn.innerText = "カメラ表示";
            }
        });

        const bgColorPicker = document.getElementById('bg-color');
        bgColorPicker.addEventListener('input', (e) => {
            document.body.style.background = e.target.value;
        });

        window.addEventListener('keydown', (e) => {
            if (!currentVrm) return;
            switch (e.key) {
                case '1': currentExpressionMode = 'happy'; setSystemStatus("active", "表情固定: 喜 (happy)"); break;
                case '2': currentExpressionMode = 'angry'; setSystemStatus("active", "表情固定: 怒 (angry)"); break;
                case '3': currentExpressionMode = 'sad'; setSystemStatus("active", "表情固定: 哀 (sad)"); break;
                case '4': currentExpressionMode = 'relaxed'; setSystemStatus("active", "表情固定: 楽 (relaxed/fun)"); break;
                case '5': currentExpressionMode = 'surprised'; setSystemStatus("active", "表情固定: 驚 (surprised/joy)"); break;
                case '0': currentExpressionMode = 'auto'; setSystemStatus("active", "トラッキング中 (正常)"); break;
            }
        });

        // --- ファイルアップロード & エラーハンドリング強化 ---
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => processFile(e.target.files[0]));

        window.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#00ffcc';
            dropZone.style.background = 'rgba(0, 255, 204, 0.2)';
        });
        window.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#aaa';
            dropZone.style.background = 'rgba(0,0,0,0.7)';
        });
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#aaa';
            dropZone.style.background = 'rgba(0,0,0,0.7)';
            const files = e.dataTransfer.files;
            if (files && files.length > 0) processFile(files[0]);
        });

        function processFile(file) {
            if (!file) return;
            
            // エラーチェック1: 拡張子チェック
            if (!file.name.toLowerCase().endsWith('.vrm')) {
                const errCode = "ERR_INVALID_EXTENSION";
                const errMsg = "読み込めるのは .vrm 形式のファイルのみです。";
                setSystemStatus("error", `${errCode}: ${errMsg}`);
                alert(`[エラーコード: ${errCode}]\n${errMsg}`);
                return;
            }

            loadingElement.style.display = 'block';
            loadingElement.style.opacity = '1';
            loadingText.innerText = "VRMアバターを解析・構築中...";
            
            const reader = new FileReader();
            reader.onload = function (event) {
                loadVRM(event.target.result).then(() => {
                    hideLoading();
                    setSystemStatus("active", "トラッキング中 (正常)");
                }).catch(err => {
                    // エラーチェック2: パースエラーや内部データ破損
                    console.error(err);
                    const code = err.code || "ERR_UNKNOWN";
                    const msg = err.msg || "VRMアバターの構築中に未知のエラーが発生しました。";
                    
                    setSystemStatus("error", `${code}: アバター生成失敗`);
                    alert(`[エラーコード: ${code}]\n${msg}\n\n※ファイルが壊れていないか、正しいVRMファイルか確認してください。`);
                    hideLoading();
                });
            };
            reader.onerror = function() {
                const errCode = "ERR_FILE_READ";
                const errMsg = "PC内からのファイルデータの読み込み自体に失敗しました。";
                setSystemStatus("error", `${errCode}: ブラウザエラー`);
                alert(`[エラーコード: ${errCode}]\n${errMsg}`);
                hideLoading();
            };
            reader.readAsDataURL(file);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
