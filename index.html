<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vrm-tracker-lite Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; color: white; user-select: none; }
        #canvas { width: 100vw; height: 100vh; display: block; }
        
        #video-container { position: fixed; bottom: 10px; right: 10px; width: 160px; height: 120px; border: 2px solid #555; border-radius: 4px; z-index: 10; background: #000; overflow: hidden; transition: opacity 0.2s; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: block; }
        #overlay-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        
        #taskbar { position: fixed; top: 0; left: 0; width: 100vw; background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(4px); border-bottom: 1px solid #333; z-index: 40; display: flex; flex-direction: column; padding: 6px 15px; box-sizing: border-box; font-size: 11px; gap: 6px; }
        .taskbar-row { display: flex; align-items: center; justify-content: space-between; width: 100%; flex-wrap: wrap; gap: 8px; }
        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .btn { background: #333; color: white; border: 1px solid #555; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn:hover, .btn.active { background: #444; border-color: #00ffcc; color: #00ffcc; }
        
        .slider-group { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 3px 10px; border-radius: 4px; border: 1px solid #333; }
        .slider-item { display: flex; align-items: center; gap: 4px; }
        .slider-item input[type="range"] { width: 60px; accent-color: #00ffcc; margin: 0; }

        .status-item { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; background: #ff4444; border-radius: 50%; display: inline-block; }
        .status-dot.active { background: #00ffcc; box-shadow: 0 0 8px #00ffcc; }
        .status-dot.error { background: #ff3333; box-shadow: 0 0 8px #ff3333; }

        #drop-zone { position: fixed; top: 110px; left: 10px; padding: 15px; background: rgba(0,0,0,0.7); color: white; border: 2px dashed #aaa; border-radius: 8px; font-size: 12px; z-index: 20; text-align: center; cursor: pointer; transition: all 0.2s; }
        #drop-zone:hover { background: rgba(255,255,255,0.1); border-color: #fff; }
        #file-input { display: none; }

        #vrm-meta-panel { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.75); padding: 12px; border-radius: 6px; font-size: 11px; border: 1px solid #444; min-width: 180px; z-index: 20; }
        #vrm-meta-panel h4 { margin: 0 0 6px 0; color: #00ffcc; font-size: 12px; border-bottom: 1px solid #444; padding-bottom: 4px; }
        .meta-line { margin: 3px 0; color: #ddd; }

        #log-container { position: fixed; bottom: 140px; right: 10px; width: 240px; z-index: 20; display: flex; flex-direction: column; gap: 4px; }
        #log-panel { height: 80px; background: rgba(0,0,0,0.8); border: 1px solid #444; border-radius: 4px; font-family: monospace; font-size: 10px; color: #00ffcc; padding: 5px; overflow-y: auto; box-sizing: border-box; }
        .log-entry { margin-bottom: 2px; line-height: 1.2; word-break: break-all; }
        .log-entry.err { color: #ff4444; }

        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 16px; background: rgba(0,0,0,0.85); padding: 25px 40px; border-radius: 8px; border: 1px solid #444; pointer-events: none; z-index: 30; text-align: center; transition: opacity 0.3s; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); width: 24px; height: 24px; border-radius: 50%; border-left-color: #00ffcc; animation: spin 1s linear infinite; margin: 0 auto 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/@pixiv/three-vrm@0.6.7/lib/three-vrm.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.umd.js"></script>
</head>
<body>
    <div id="taskbar">
        <div class="taskbar-row">
            <div><strong>vrm-tracker-lite Pro</strong></div>
            <div class="slider-group">
                <span style="color:#00ffcc;">位置・向き調整:</span>
                <div class="slider-item"><label>左右</label><input type="range" id="pos-x" min="-1" max="1" step="0.01" value="0"></div>
                <div class="slider-item"><label>高さ</label><input type="range" id="pos-y" min="-1" max="1" step="0.01" value="0"></div>
                <div class="slider-item"><label>奥行</label><input type="range" id="pos-z" min="-1" max="1" step="0.01" value="0"></div>
                <div class="slider-item"><label>回転</label><input type="range" id="rot-y" min="-180" max="180" step="1" value="180"></div>
            </div>
            <div class="controls">
                <button id="toggle-video" class="btn">カメラ非表示</button>
                <div class="status-item"><span id="status-dot" class="status-dot"></span><span id="status-text">初期化中</span></div>
            </div>
        </div>
        <div class="taskbar-row" style="border-top: 1px solid #333; padding-top: 4px;">
            <div class="controls" id="track-target-buttons">
                <span style="color:#aaa;">動かす場所:</span>
                <button class="btn active" data-target="face">顔のみ</button>
                <button class="btn" data-target="body">顔＋からだ</button>
                <button class="btn" data-target="all">顔＋からだ＋て</button>
            </div>
            <div class="controls" id="expression-buttons">
                <span style="color:#aaa;">表情変更:</span>
                <button class="btn active" data-exp="auto">自動</button>
                <button class="btn" data-exp="happy">喜</button>
                <button class="btn" data-exp="angry">怒</button>
                <button class="btn" data-exp="sad">哀</button>
                <button class="btn" data-exp="relaxed">楽</button>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" accept=".vrm">
    <div id="drop-zone">ここにVRMファイルを<br>ドロップ または クリック</div>
    
    <div id="vrm-meta-panel">
        <h4>アバター情報</h4>
        <div class="meta-line">名前: <span id="meta-name">向きが分かるロボ</span></div>
        <div class="meta-line">作者: <span id="meta-author">System Generated</span></div>
    </div>

    <div id="log-container">
        <div id="log-panel"></div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-text">AIとカメラを起動中...</div>
    </div>
    
    <div id="video-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay-canvas"></canvas>
    </div>
    
    <canvas id="canvas"></canvas>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const overlayCanvas = document.getElementById('overlay-canvas');
        const ctx = overlayCanvas.getContext('2d');
        
        const loadingElement = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const logPanel = document.getElementById('log-panel');
        
        const metaName = document.getElementById('meta-name');
        const metaAuthor = document.getElementById('meta-author');

        // 位置スライダーの取得
        const sliderX = document.getElementById('pos-x');
        const sliderY = document.getElementById('pos-y');
        const sliderZ = document.getElementById('pos-z');
        const sliderRotY = document.getElementById('rot-y');

        let currentVrm = null;
        let dummyVrm = null; 
        let isUsingDummy = true;
        let currentExpressionMode = "auto";
        let trackingTarget = "face"; // face, body, all
        let basePosition = new THREE.Vector3(0, 0, 0);

        function addLog(text, isError = false) {
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry' + (isError ? ' err' : '');
            entry.innerText = `[${time}] ${text}`;
            logPanel.appendChild(entry);
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        addLog("システムを起動しています...");

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20.0);
        camera.position.set(0.0, 1.4, 0.55);

        const renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));

        const light = new THREE.DirectionalLight(0xffffff, 1.0);
        light.position.set(1.0, 1.0, 1.0).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        // 初期アバター（ロボット）生成
        function createDummyAvatar() {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x444446, roughness: 0.4 });
            const faceMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc });
            
            const neckGeo = new THREE.CylinderGeometry(0.02, 0.025, 0.1);
            const neckMesh = new THREE.Mesh(neckGeo, bodyMat);
            neckMesh.position.y = 1.25;
            group.add(neckMesh);

            const headGroup = new THREE.Group();
            headGroup.position.y = 1.4; 
            const headMesh = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.14, 0.14), bodyMat);
            headGroup.add(headMesh);

            const visor = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.04, 0.02), faceMat);
            visor.position.set(0, 0.02, 0.065);
            headGroup.add(visor);

            const mouth = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.008, 0.01), faceMat);
            mouth.position.set(0, -0.04, 0.07);
            headGroup.add(mouth);

            group.add(headGroup);
            scene.add(group);

            dummyVrm = { scene: group, head: headGroup, neck: neckMesh, mouth: mouth, visor: visor, update: () => {} };
            camera.lookAt(0.0, 1.4, 0.0);
            addLog("初期アバターを生成しました。");
        }
        createDummyAvatar();

        // 位置・回転のリアルタイム反映ループ
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            const targetScene = isUsingDummy ? dummyVrm?.scene : currentVrm?.scene;
            if (targetScene) {
                // スライダーの値を位置と向きに反映
                targetScene.position.x = basePosition.x + parseFloat(sliderX.value);
                targetScene.position.y = basePosition.y + parseFloat(sliderY.value);
                targetScene.position.z = basePosition.z + parseFloat(sliderZ.value);
                targetScene.rotation.y = (parseFloat(sliderRotY.value) * Math.PI) / 180;
            }

            if (currentVrm) { currentVrm.update(delta); }
            renderer.render(scene, camera);
        }
        animate();

        // 簡易プレビュー描画
        function drawOverlay(results) {
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            ctx.fillStyle = "#00ffcc";
            if (results.faceLandmarks) {
                results.faceLandmarks.forEach(pt => ctx.fillRect(pt.x * overlayCanvas.width - 1, pt.y * overlayCanvas.height - 1, 2, 2));
            }
            ctx.fillStyle = "#ff3366";
            if (results.leftHandLandmarks) {
                results.leftHandLandmarks.forEach(pt => ctx.fillRect(pt.x * overlayCanvas.width - 2, pt.y * overlayCanvas.height - 2, 4, 4));
            }
            if (results.rightHandLandmarks) {
                results.rightHandLandmarks.forEach(pt => ctx.fillRect(pt.x * overlayCanvas.width - 2, pt.y * overlayCanvas.height - 2, 4, 4));
            }
        }

        // VRM読み込み
        function loadVRM(url) {
            return new Promise((resolve, reject) => {
                try {
                    const loader = new THREE.GLTFLoader();
                    loader.crossOrigin = 'anonymous';
                    loader.load(url, (gltf) => {
                        THREE_VRM.VRM.from(gltf).then((vrm) => {
                            if (dummyVrm && isUsingDummy) {
                                scene.remove(dummyVrm.scene);
                                isUsingDummy = false;
                            }
                            if (currentVrm) {
                                scene.remove(currentVrm.scene);
                                currentVrm.dispose();
                            }

                            currentVrm = vrm;
                            scene.add(vrm.scene);

                            // ボーン位置を基準にカメラと基本位置を自動調整
                            const head = vrm.humanoid?.getBoneNode('head');
                            if(head) {
                                const headWorldPos = new THREE.Vector3();
                                head.getWorldPosition(headWorldPos);
                                camera.position.set(0.0, headWorldPos.y, 0.55);
                                camera.lookAt(0.0, headWorldPos.y, 0.0);
                            }

                            metaName.innerText = vrm.meta?.title || "未設定";
                            metaAuthor.innerText = vrm.meta?.author || "未設定";
                            addLog(`アバター構築成功: ${vrm.meta?.title || "VRM"}`);
                            resolve(vrm);
                        }).catch(e => reject({ code: "ERR_VRM_PARSE", detail: e.message }));
                    }, undefined, (err) => reject({ code: "ERR_GLTF_LOAD", detail: err?.message }));
                } catch (e) { reject({ code: "ERR_SETUP", detail: e.message }); }
            });
        }

        // AIトラッキングのメイン処理
        async function initializeSystem() {
            const holistic = new Holistic({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`
            });

            holistic.setOptions({
                modelComplexity: 1,
                smoothLandmarks: true,
                refineFaceLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            holistic.onResults((results) => {
                if (overlayCanvas.width !== videoElement.videoWidth) {
                    overlayCanvas.width = videoElement.videoWidth;
                    overlayCanvas.height = videoElement.videoHeight;
                }
                drawOverlay(results);

                // Kalidokitで骨組みの角度計算
                const riggedPose = Kalidokit.Pose.solve(results.poseLandmarks, results.ea, { runtime: "mediapipe", video: videoElement });
                const riggedFace = Kalidokit.Face.solve(results.faceLandmarks, { runtime: "mediapipe", video: videoElement });
                const riggedLeftHand = Kalidokit.Hand.solve(results.leftHandLandmarks, "Left");
                const riggedRightHand = Kalidokit.Hand.solve(results.rightHandLandmarks, "Right");

                if (isUsingDummy && dummyVrm && riggedFace) {
                    dummyVrm.head.rotation.set(riggedFace.head.x, riggedFace.head.y, riggedFace.head.z);
                    return;
                }

                if (currentVrm) {
                    const humanoid = currentVrm.humanoid;
                    
                    // 1. 【かお】の連動
                    if (riggedFace) {
                        const head = humanoid?.getBoneNode('head');
                        const neck = humanoid?.getBoneNode('neck');
                        if (head) head.rotation.set(riggedFace.head.x, riggedFace.head.y, riggedFace.head.z);
                        if (neck) neck.rotation.set(riggedFace.head.x * 0.3, riggedFace.head.y * 0.3, riggedFace.head.z * 0.3);
                        
                        // 表情処理
                        const target = currentVrm.blendShapeProxy;
                        if (target) {
                            if (currentExpressionMode === "auto") {
                                target.setValue('blink_l', riggedFace.eye.l);
                                target.setValue('blink_r', riggedFace.eye.r);
                                target.setValue('i', riggedFace.mouth.shape.I);
                                target.setValue('u', riggedFace.mouth.shape.U);
                                target.setValue('a', riggedFace.mouth.shape.A);
                            } else {
                                ['angry', 'fun', 'joy', 'sorrow'].forEach(exp => target.setValue(exp, exp === currentExpressionMode ? 1.0 : 0.0));
                            }
                        }
                    }

                    // 2. 【からだ（上半身）】の連動 (body または all の場合)
                    if ((trackingTarget === "body" || trackingTarget === "all") && riggedPose) {
                        const spine = humanoid?.getBoneNode('spine');
                        const chest = humanoid?.getBoneNode('chest');
                        const upperArmL = humanoid?.getBoneNode('leftUpperArm');
                        const upperArmR = humanoid?.getBoneNode('rightUpperArm');
                        const lowerArmL = humanoid?.getBoneNode('leftLowerArm');
                        const lowerArmR = humanoid?.getBoneNode('rightLowerArm');

                        if (spine) spine.rotation.set(riggedPose.spine.x, riggedPose.spine.y, riggedPose.spine.z);
                        if (chest) chest.rotation.set(riggedPose.spine.x * 0.5, riggedPose.spine.y * 0.5, riggedPose.spine.z * 0.5);
                        if (upperArmL) upperArmL.rotation.set(riggedPose.leftUpperArm.x, riggedPose.leftUpperArm.y, riggedPose.leftUpperArm.z);
                        if (upperArmR) upperArmR.rotation.set(riggedPose.rightUpperArm.x, riggedPose.rightUpperArm.y, riggedPose.rightUpperArm.z);
                        if (lowerArmL) lowerArmL.rotation.set(riggedPose.leftLowerArm.x, riggedPose.leftLowerArm.y, riggedPose.leftLowerArm.z);
                        if (lowerArmR) lowerArmR.rotation.set(riggedPose.rightLowerArm.x, riggedPose.rightLowerArm.y, riggedPose.rightLowerArm.z);
                    }

                    // 3. 【て（指先）】の連動 (all の場合のみ)
                    if (trackingTarget === "all") {
                        if (riggedLeftHand) {
                            const handL = humanoid?.getBoneNode('leftHand');
                            if (handL) handL.rotation.set(riggedLeftHand.leftWrist.x, riggedLeftHand.leftWrist.y, riggedLeftHand.leftWrist.z);
                            // 指の連動ループ（簡易）
                            ['thumb','index','middle','ring','little'].forEach(finger => {
                                for(let i=1; i<=3; i++) {
                                    const bone = humanoid?.getBoneNode(`left${finger.charAt(0).toUpperCase() + finger.slice(1)}${i}`);
                                    if(bone && riggedLeftHand[finger]) bone.rotation.z = riggedLeftHand[finger][i-1].z;
                                }
                            });
                        }
                        if (riggedRightHand) {
                            const handR = humanoid?.getBoneNode('rightHand');
                            if (handR) handR.rotation.set(riggedRightHand.rightWrist.x, riggedRightHand.rightWrist.y, riggedRightHand.rightWrist.z);
                            ['thumb','index','middle','ring','little'].forEach(finger => {
                                for(let i=1; i<=3; i++) {
                                    const bone = humanoid?.getBoneNode(`right${finger.charAt(0).toUpperCase() + finger.slice(1)}${i}`);
                                    if(bone && riggedRightHand[finger]) bone.rotation.z = riggedRightHand[finger][i-1].z;
                                }
                            });
                        }
                    }
                }
            });

            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => { await holistic.send({ image: videoElement }); },
                width: 320, height: 240
            });

            try {
                await cameraUtils.start();
                loadingElement.style.display = 'none';
                statusDot.className = "status-dot active";
                statusText.innerText = "準備完了。VRMをドロップしてください。";
                addLog("AIトラッキングエンジンが正常に起動しました。");
            } catch (e) {
                addLog("カメラの起動に失敗しました。", true);
                statusDot.className = "status-dot error";
                statusText.innerText = "カメラエラー";
            }
        }

        // 動かす場所のボタン切り替えイベント
        document.getElementById('track-target-buttons').addEventListener('click', (e) => {
            if (e.target.classList.contains('btn')) {
                document.querySelectorAll('#track-target-buttons .btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                trackingTarget = e.target.getAttribute('data-target');
                addLog(`動かす場所を切り替えました: [${e.target.innerText}]`);
                
                // 切り替え時に対象外パーツのポーズを安全にリセット
                if (currentVrm && trackingTarget !== "all") {
                    // 指や腕のポーズを初期化する処理をここに入れるとより滑らかになります
                }
            }
        });

        // 表情切り替えイベント
        document.getElementById('expression-buttons').addEventListener('click', (e) => {
            if (e.target.classList.contains('btn')) {
                document.querySelectorAll('#expression-buttons .btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentExpressionMode = e.target.getAttribute('data-exp');
            }
        });

        // ファイルドロップ処理
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => processFile(e.target.files[0]));
        window.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = 'rgba(0, 255, 204, 0.2)'; });
        window.addEventListener('dragleave', () => dropZone.style.background = 'rgba(0,0,0,0.7)';);
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.background = 'rgba(0,0,0,0.7)';
            if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]);
        });

        function processFile(file) {
            if (!file || !file.name.toLowerCase().endsWith('.vrm')) return;
            addLog(`ファイル読み込み中: ${file.name}`);
            const reader = new FileReader();
            reader.onload = (e) => {
                loadVRM(e.target.result).catch(err => {
                    addLog(`構築失敗: ${err.code} (${err.detail})`, true);
                });
            };
            reader.readAsDataURL(file);
        }

        const toggleVideoBtn = document.getElementById('toggle-video');
        toggleVideoBtn.addEventListener('click', () => {
            const container = document.getElementById('video-container');
            container.style.opacity = container.style.opacity === '0' ? '1' : '0';
            toggleVideoBtn.innerText = container.style.opacity === '0' ? "カメラ表示" : "カメラ非表示";
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initializeSystem();
    </script>
</body>
</html>
