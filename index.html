<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vrm-tracker-lite</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; color: white; user-select: none; }
        #canvas { width: 100vw; height: 100vh; display: block; }
        
        #video-container { position: fixed; bottom: 10px; right: 10px; width: 160px; height: 120px; border: 2px solid #555; border-radius: 4px; z-index: 10; background: #000; overflow: hidden; transition: opacity 0.2s; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: block; }
        #overlay-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        
        #taskbar { position: fixed; top: 0; left: 0; width: 100vw; background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(4px); border-bottom: 1px solid #333; z-index: 40; display: flex; flex-direction: column; padding: 5px 15px; box-sizing: border-box; font-size: 12px; gap: 5px; }
        .taskbar-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .btn { background: #333; color: white; border: 1px solid #555; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn:hover, .btn.active { background: #444; border-color: #00ffcc; color: #00ffcc; }
        .color-picker-wrapper { display: flex; align-items: center; gap: 5px; }
        #bg-color { border: none; width: 20px; height: 20px; padding: 0; background: none; cursor: pointer; }

        .status-item { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; background: #ff4444; border-radius: 50%; display: inline-block; }
        .status-dot.active { background: #00ffcc; box-shadow: 0 0 8px #00ffcc; }
        .status-dot.error { background: #ff3333; box-shadow: 0 0 8px #ff3333; }

        #drop-zone { position: fixed; top: 80px; left: 10px; padding: 15px; background: rgba(0,0,0,0.7); color: white; border: 2px dashed #aaa; border-radius: 8px; font-size: 12px; z-index: 20; text-align: center; cursor: pointer; transition: all 0.2s; }
        #drop-zone:hover { background: rgba(255,255,255,0.1); border-color: #fff; }
        #file-input { display: none; }

        #vrm-meta-panel { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.75); padding: 12px; border-radius: 6px; font-size: 11px; border: 1px solid #444; min-width: 180px; z-index: 20; }
        #vrm-meta-panel h4 { margin: 0 0 6px 0; color: #00ffcc; font-size: 12px; border-bottom: 1px solid #444; padding-bottom: 4px; }
        .meta-line { margin: 3px 0; color: #ddd; }
        .meta-label { color: #aaa; }

        #log-container { position: fixed; bottom: 140px; right: 10px; width: 240px; z-index: 20; display: flex; flex-direction: column; gap: 4px; }
        #log-panel { height: 100px; background: rgba(0,0,0,0.8); border: 1px solid #444; border-radius: 4px; font-family: monospace; font-size: 10px; color: #00ffcc; padding: 5px; overflow-y: auto; box-sizing: border-box; }
        .log-entry { margin-bottom: 2px; line-height: 1.2; word-break: break-all; }
        .log-entry.err { color: #ff4444; }
        .log-btn-wrapper { display: flex; justify-content: flex-end; }

        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 16px; background: rgba(0,0,0,0.85); padding: 25px 40px; border-radius: 8px; border: 1px solid #444; pointer-events: none; z-index: 30; text-align: center; transition: opacity 0.3s; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); width: 24px; height: 24px; border-radius: 50%; border-left-color: #00ffcc; animation: spin 1s linear infinite; margin: 0 auto 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/@pixiv/three-vrm@0.6.7/lib/three-vrm.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.umd.js"></script>
</head>
<body>
    <div id="taskbar">
        <div class="taskbar-row">
            <div><strong>vrm-tracker-lite (Universal)</strong></div>
            <div class="controls">
                <button id="toggle-video" class="btn">カメラ非表示</button>
                <div class="color-picker-wrapper">
                    <label for="bg-color">背景色:</label>
                    <input type="color" id="bg-color" value="#1a1a1a">
                </div>
                <div class="status-item">
                    <span id="status-dot" class="status-dot"></span>
                    <span id="status-text">システム初期化中</span>
                </div>
            </div>
        </div>
        <div class="taskbar-row" style="border-top: 1px solid #333; padding-top: 4px;">
            <div class="controls" id="expression-buttons">
                <span style="color:#aaa; font-size:11px;">表情変更:</span>
                <button class="btn active" data-exp="auto">自動 (0)</button>
                <button class="btn" data-exp="happy">喜 (1)</button>
                <button class="btn" data-exp="angry">怒 (2)</button>
                <button class="btn" data-exp="sad">哀 (3)</button>
                <button class="btn" data-exp="relaxed">楽 (4)</button>
                <button class="btn" data-exp="surprised">驚 (5)</button>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" accept=".vrm">
    <div id="drop-zone">ここにVRMファイルを<br>ドロップ または クリック</div>
    
    <div id="vrm-meta-panel">
        <h4>アバター情報</h4>
        <div class="meta-line"><span class="meta-label">名前:</span> <span id="meta-name">向きが分かるロボ</span></div>
        <div class="meta-line"><span class="meta-label">作者:</span> <span id="meta-author">System Generated</span></div>
        <div class="meta-line"><span class="meta-label">規格:</span> <span id="meta-version">LOCAL</span></div>
    </div>

    <div id="log-container">
        <div class="log-btn-wrapper">
            <button id="copy-log-btn" class="btn" style="padding: 1px 6px; font-size: 9px; border-color: #444;">ログをコピー</button>
        </div>
        <div id="log-panel"></div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-text">カメラとAIを起動中...</div>
    </div>
    
    <div id="video-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay-canvas"></canvas>
    </div>
    
    <canvas id="canvas"></canvas>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const overlayCanvas = document.getElementById('overlay-canvas');
        const ctx = overlayCanvas.getContext('2d');
        
        const loadingElement = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const logPanel = document.getElementById('log-panel');
        const copyLogBtn = document.getElementById('copy-log-btn');
        
        const metaName = document.getElementById('meta-name');
        const metaAuthor = document.getElementById('meta-author');
        const metaVersion = document.getElementById('meta-version');

        let currentVrm = null;
        let dummyVrm = null; 
        let isUsingDummy = true;
        let vrmVersion = "0.0"; 
        let currentExpressionMode = "auto";
        let rawLogs = [];

        function addLog(text, isError = false) {
            const time = new Date().toLocaleTimeString();
            const logText = `[${time}] ${text}`;
            rawLogs.push(logText);

            const entry = document.createElement('div');
            entry.className = 'log-entry' + (isError ? ' err' : '');
            entry.innerText = logText;
            logPanel.appendChild(entry);
            logPanel.scrollTop = logPanel.scrollHeight;
            console.log(`[SYS_LOG] ${text}`);
        }

        copyLogBtn.addEventListener('click', () => {
            if (rawLogs.length === 0) return;
            const fullLogText = rawLogs.join('\n');
            navigator.clipboard.writeText(fullLogText).then(() => {
                const originalText = copyLogBtn.innerText;
                copyLogBtn.innerText = "コピー完了！";
                copyLogBtn.style.color = "#00ffcc";
                setTimeout(() => {
                    copyLogBtn.innerText = originalText;
                    copyLogBtn.style.color = "white";
                }, 1500);
            }).catch(err => {
                alert("ログのコピーに失敗しました: " + err);
            });
        });

        addLog("システムを起動しています...");

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20.0);
        camera.position.set(0.0, 1.4, 0.55);

        const renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));

        const light = new THREE.DirectionalLight(0xffffff, 1.0);
        light.position.set(1.0, 1.0, 1.0).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        function createDummyAvatar() {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x444446, roughness: 0.4, metalness: 0.5 });
            const faceMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, roughness: 0.2 });
            const pointerMat = new THREE.MeshBasicMaterial({ color: 0xff3366 });
            
            const neckGeo = new THREE.CylinderGeometry(0.02, 0.025, 0.1);
            const neckMesh = new THREE.Mesh(neckGeo, bodyMat);
            neckMesh.position.y = 1.25;
            group.add(neckMesh);

            const headGroup = new THREE.Group();
            headGroup.position.y = 1.4; 
            
            const headGeo = new THREE.BoxGeometry(0.14, 0.14, 0.14);
            const headMesh = new THREE.Mesh(headGeo, bodyMat);
            headGroup.add(headMesh);

            const visorGeo = new THREE.BoxGeometry(0.12, 0.04, 0.02);
            const visorMesh = new THREE.Mesh(visorGeo, faceMat);
            visorMesh.position.set(0, 0.02, 0.065);
            headGroup.add(visorMesh);

            const noseGeo = new THREE.ConeGeometry(0.015, 0.06, 4);
            const noseMesh = new THREE.Mesh(noseGeo, pointerMat);
            noseMesh.position.set(0, -0.02, 0.09);
            noseMesh.rotation.x = Math.PI / 2;
            headGroup.add(noseMesh);

            const antGeo = new THREE.CylinderGeometry(0.005, 0.005, 0.06);
            const antMesh = new THREE.Mesh(antGeo, pointerMat);
            antMesh.position.set(0, 0.1, 0);
            headGroup.add(antMesh);

            const mouthGeo = new THREE.BoxGeometry(0.05, 0.008, 0.01);
            const mouthMesh = new THREE.Mesh(mouthGeo, faceMat);
            mouthMesh.position.set(0, -0.04, 0.07);
            headGroup.add(mouthMesh);

            group.add(headGroup);
            scene.add(group);

            dummyVrm = { scene: group, head: headGroup, neck: neckMesh, mouth: mouthMesh, visor: visorMesh, update: () => {} };
            camera.lookAt(0.0, 1.4, 0.0);
            addLog("初期アバター（方向インジケータ付きロボ）を生成しました。");
        }
        createDummyAvatar();

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (currentVrm) { currentVrm.update(delta); }
            renderer.render(scene, camera);
        }
        animate();

        function drawFaceMesh(landmarks) {
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            const hasIris = landmarks.length > 468;

            for (let i = 0; i < landmarks.length; i++) {
                const x = landmarks[i].x * overlayCanvas.width;
                const y = landmarks[i].y * overlayCanvas.height;
                
                if (hasIris && i >= 468) {
                    ctx.fillStyle = "#ff3366";
                    ctx.fillRect(x - 1.2, y - 1.2, 2.4, 2.4);
                } else if (i === 1 || i === 13 || i === 14) {
                    ctx.fillStyle = "#ffcc00";
                    ctx.fillRect(x - 1.5, y - 1.5, 3, 3);
                } else {
                    ctx.fillStyle = "#00ffcc";
                    ctx.fillRect(x - 0.8, y - 0.8, 1.6, 1.6);
                }
            }
        }

        // --- バージョン安全定義のVRM読み込み ---
        function loadVRM(url) {
            return new Promise((resolve, reject) => {
                try {
                    const LoaderClass = THREE.GLTFLoader;
                    if (!LoaderClass) {
                        reject({ code: "ERR_NO_LOADER_CLASS", msg: "GLTFLoaderクラスライブラリがロードされていません。" });
                        return;
                    }

                    const loader = new LoaderClass();
                    loader.crossOrigin = 'anonymous';
                    
                    loader.load(url, (gltf) => {
                        try {
                            THREE_VRM.VRM.from(gltf).then((vrm) => {
                                if (dummyVrm && isUsingDummy) {
                                    scene.remove(dummyVrm.scene);
                                    isUsingDummy = false;
                                    addLog("初期ロボットモデルを非表示にしました。");
                                }
                                if (currentVrm) {
                                    scene.remove(currentVrm.scene);
                                    currentVrm.dispose();
                                }

                                currentVrm = vrm;
                                scene.add(vrm.scene);
                                vrm.scene.rotation.y = Math.PI; 

                                displayVrmMeta(gltf, vrm);
                                
                                const head = vrm.humanoid?.getBoneNode(THREE_VRM.VRMHumanBoneName.Head);
                                if(head) {
                                    const headWorldPos = new THREE.Vector3();
                                    head.getWorldPosition(headWorldPos);
                                    camera.position.set(0.0, headWorldPos.y, 0.55);
                                    camera.lookAt(0.0, headWorldPos.y, 0.0);
                                }
                                resolve(vrm);
                            }).catch(innerVrmErr => {
                                reject({ code: "ERR_VRM_PARSE", msg: "VRMへの変換に失敗しました。", detail: innerVrmErr.message });
                            });
                        } catch (innerErr) {
                            reject({ code: "ERR_PARSING_CRASH", msg: "パース処理中にスクリプトがクラッシュしました。", detail: innerErr.message });
                        }
                    }, undefined, (err) => {
                        reject({ code: "ERR_GLTF_LOAD", msg: "GLTFLoaderの読み込み自体が失敗しました。", detail: err?.message || err });
                    });
                } catch (setupErr) {
                    reject({ code: "ERR_SETUP", msg: "ローダーのセットアップ中に例外エラーが発生しました。", detail: setupErr.message });
                }
            });
        }

        function displayVrmMeta(gltf, vrm) {
            let name = "不明なアバター";
            let author = "不明な作者";

            if (vrm.meta) {
                name = vrm.meta.title || "未設定";
                author = vrm.meta.author || "未設定";
            }

            metaName.innerText = name;
            metaAuthor.innerText = author;
            metaVersion.innerText = `VRM 0.x`;
            addLog(`アバター構築成功: ${name} (VRM 0.x)`);
        }

        async function initializeSystem() {
            const faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });

            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true, 
                minDetectionConfidence: 0.6, 
                minTrackingConfidence: 0.6
            });

            faceMesh.onResults((results) => {
                if (overlayCanvas.width !== videoElement.videoWidth) {
                    overlayCanvas.width = videoElement.videoWidth;
                    overlayCanvas.height = videoElement.videoHeight;
                    addLog(`キャプチャ解像度をマッピングしました: ${overlayCanvas.width}x${overlayCanvas.height}`);
                }

                if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
                    ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
                    return;
                }
                
                const landmarks = results.multiFaceLandmarks[0];
                drawFaceMesh(landmarks);

                const riggedFace = Kalidokit.Face.solve(results.multiFaceLandmarks, { runtime: "mediapipe", video: videoElement });
                if (!riggedFace) return;

                if (isUsingDummy && dummyVrm) {
                    dummyVrm.head.rotation.set(riggedFace.head.x, riggedFace.head.y, riggedFace.head.z);
                    dummyVrm.neck.rotation.set(riggedFace.head.x * 0.3, riggedFace.head.y * 0.3, riggedFace.head.z * 0.3);
                    const eyeOpen = 1 - (riggedFace.eye.l + riggedFace.eye.r) / 2;
                    dummyVrm.visor.scale.y = Math.max(0.1, eyeOpen);
                    const openRatio = riggedFace.mouth.shape.A * 3 + riggedFace.mouth.shape.I * 1;
                    dummyVrm.mouth.scale.x = Math.max(1, 1 + openRatio * 2);
                    return;
                }

                if (currentVrm) {
                    const head = currentVrm.humanoid?.getBoneNode(THREE_VRM.VRMHumanBoneName.Head);
                    const neck = currentVrm.humanoid?.getBoneNode(THREE_VRM.VRMHumanBoneName.Neck);
                    
                    if (head) head.rotation.set(riggedFace.head.x, riggedFace.head.y, riggedFace.head.z);
                    if (neck) neck.rotation.set(riggedFace.head.x * 0.3, riggedFace.head.y * 0.3, riggedFace.head.z * 0.3);
                    
                    const target = currentVrm.blendShapeProxy;
                    if (target) {
                        if (currentExpressionMode === "auto") {
                            target.setValue(THREE_VRM.VRMBlendShapePresetName.BlinkL, riggedFace.eye.l);
                            target.setValue(THREE_VRM.VRMBlendShapePresetName.BlinkR, riggedFace.eye.r);
                            target.setValue(THREE_VRM.VRMBlendShapePresetName.I, riggedFace.mouth.shape.I);
                            target.setValue(THREE_VRM.VRMBlendShapePresetName.U, riggedFace.mouth.shape.U);
                            target.setValue(THREE_VRM.VRMBlendShapePresetName.A, riggedFace.mouth.shape.A);
                            [THREE_VRM.VRMBlendShapePresetName.Angry, THREE_VRM.VRMBlendShapePresetName.Fun, THREE_VRM.VRMBlendShapePresetName.Joy, THREE_VRM.VRMBlendShapePresetName.Sorrow].forEach(exp => target.setValue(exp, 0));
                        } else {
                            const activeExp = currentExpressionMode;
                            let vrmPreset = THREE_VRM.VRMBlendShapePresetName.Joy;
                            if (activeExp === 'happy') vrmPreset = THREE_VRM.VRMBlendShapePresetName.Joy;
                            if (activeExp === 'angry') vrmPreset = THREE_VRM.VRMBlendShapePresetName.Angry;
                            if (activeExp === 'sad') vrmPreset = THREE_VRM.VRMBlendShapePresetName.Sorrow;
                            if (activeExp === 'relaxed') vrmPreset = THREE_VRM.VRMBlendShapePresetName.Fun;
                            if (activeExp === 'surprised') vrmPreset = THREE_VRM.VRMBlendShapePresetName.Joy; 
                            
                            [THREE_VRM.VRMBlendShapePresetName.Angry, THREE_VRM.VRMBlendShapePresetName.Fun, THREE_VRM.VRMBlendShapePresetName.Joy, THREE_VRM.VRMBlendShapePresetName.Sorrow].forEach(exp => {
                                target.setValue(exp, exp === vrmPreset ? 1.0 : 0.0);
                            });
                            target.setValue(THREE_VRM.VRMBlendShapePresetName.BlinkL, riggedFace.eye.l);
                            target.setValue(THREE_VRM.VRMBlendShapePresetName.BlinkR, riggedFace.eye.r);
                        }
                    }
                }
            });

            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => { await faceMesh.send({ image: videoElement }); },
                width: 320,
                height: 240
            });

            try {
                addLog("カメラデバイスの初期化ストリームを開いています...");
                await cameraUtils.start();
                hideLoading();
                setSystemStatus("active", "準備完了。VRMを入れてください。");
                addLog("高精度AIトラッキングエンジン（Iris対応）が起動しました。");
            } catch (error) {
                addLog("エラー: カメラアクセス拒否または未接続", true);
                hideLoading();
                setSystemStatus("error", "ERR_CAMERA_BLOCKED: カメラの起動に失敗しました。");
            }
        }

        function hideLoading() {
            loadingElement.style.opacity = '0';
            setTimeout(() => loadingElement.style.display = 'none', 300);
        }

        function setSystemStatus(type, text) {
            statusDot.className = "status-dot " + type;
            statusText.innerText = text;
        }

        initializeSystem();

        function changeExpressionMode(mode) {
            if (isUsingDummy) {
                addLog("初期ロボット時は表情手動固定コマンドをバイパスします。");
                return;
            }
            currentExpressionMode = mode;
            
            const buttons = document.querySelectorAll('#expression-buttons .btn');
            buttons.forEach(btn => {
                if (btn.getAttribute('data-exp') === mode) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            if (mode === "auto") {
                setSystemStatus("active", "トラッキング中 (正常)");
                addLog("表情モード: 自動フェイストラッキングを再開。");
            } else {
                setSystemStatus("active", `表情固定: ${mode}`);
                addLog(`表情固定をロックしました: [${mode}]`);
            }
        }

        document.getElementById('expression-buttons').addEventListener('click', (e) => {
            if (e.target.classList.contains('btn')) {
                changeExpressionMode(e.target.getAttribute('data-exp'));
            }
        });

        window.addEventListener('keydown', (e) => {
            switch (e.key) {
                case '1': changeExpressionMode('happy'); break;
                case '2': changeExpressionMode('angry'); break;
                case '3': changeExpressionMode('sad'); break;
                case '4': changeExpressionMode('relaxed'); break;
                case '5': changeExpressionMode('surprised'); break;
                case '0': changeExpressionMode('auto'); break;
            }
        });

        const toggleVideoBtn = document.getElementById('toggle-video');
        toggleVideoBtn.addEventListener('click', () => {
            const container = document.getElementById('video-container');
            if (container.style.opacity === '0') {
                container.style.opacity = '1';
                toggleVideoBtn.innerText = "カメラ非表示";
                addLog("プレビューを表示しました。");
            } else {
                container.style.opacity = '0';
                toggleVideoBtn.innerText = "カメラ表示";
                addLog("プレビューを非表示にしました。");
            }
        });

        const bgColorPicker = document.getElementById('bg-color');
        bgColorPicker.addEventListener('input', (e) => {
            document.body.style.background = e.target.value;
        });

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => processFile(e.target.files[0]));

        window.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#00ffcc';
            dropZone.style.background = 'rgba(0, 255, 204, 0.2)';
        });
        window.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#aaa';
            dropZone.style.background = 'rgba(0,0,0,0.7)';
        });
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#aaa';
            dropZone.style.background = 'rgba(0,0,0,0.7)';
            const files = e.dataTransfer.files;
            if (files && files.length > 0) processFile(files[0]);
        });

        function processFile(file) {
            if (!file) return;
            
            if (!file.name.toLowerCase().endsWith('.vrm')) {
                const errCode = "ERR_INVALID_EXTENSION";
                const errMsg = "読み込めるのは .vrm 形式のファイルのみです。";
                setSystemStatus("error", `${errCode}: ${errMsg}`);
                addLog(`エラー: ${errCode} - ${errMsg}`, true);
                alert(`[エラーコード: ${errCode}]\n${errMsg}`);
                return;
            }

            addLog(`ファイル読み込みリクエスト: ${file.name} (${Math.round(file.size / 1024 / 1024 * 100) / 100} MB)`);
            loadingElement.style.display = 'block';
            loadingElement.style.opacity = '1';
            loadingText.innerText = "VRMアバターを解析・構築中...";
            
            const reader = new FileReader();
            reader.onload = function (event) {
                loadVRM(event.target.result).then(() => {
                    hideLoading();
                    setSystemStatus("active", "トラッキング中 (正常)");
                }).catch(err => {
                    console.error(err);
                    const code = err.code || "ERR_UNKNOWN";
                    const msg = err.msg || "未知のエラー";
                    const detail = err.detail ? ` (${err.detail})` : "";
                    setSystemStatus("error", `${code}: アバター生成失敗`);
                    addLog(`構築失敗: ${code} - ${msg}${detail}`, true);
                    alert(`[エラーコード: ${code}]\n${msg}${detail}`);
                    hideLoading();
                });
            };
            reader.readAsDataURL(file);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
