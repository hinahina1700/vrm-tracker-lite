<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vrm-tracker-lite</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00ff00; font-family: sans-serif; color: white; user-select: none; }
        #canvas { width: 100vw; height: 100vh; display: block; }
        
        #video-container { position: fixed; bottom: 10px; right: 10px; width: 160px; height: 120px; border: 2px solid #555; border-radius: 4px; z-index: 10; background: #000; overflow: hidden; transition: opacity 0.2s; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: block; }
        #overlay-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        
        #taskbar { position: fixed; top: 0; left: 0; width: 100vw; background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(4px); border-bottom: 1px solid #333; z-index: 40; display: flex; flex-direction: column; padding: 6px 15px; box-sizing: border-box; font-size: 11px; gap: 6px; }
        .taskbar-row { display: flex; align-items: center; justify-content: space-between; width: 100%; flex-wrap: wrap; gap: 8px; }
        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .btn { background: #333; color: white; border: 1px solid #555; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn:hover, .btn.active { background: #444; border-color: #00ffcc; color: #00ffcc; }
        .btn-rec { border-color: #ff4444; }
        .btn-rec.active { background: #ff4444; color: white; border-color: #ff4444; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .status-item { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; background: #ff4444; border-radius: 50%; display: inline-block; }
        .status-dot.active { background: #00ffcc; box-shadow: 0 0 8px #00ffcc; }

        #drop-zone { position: fixed; top: 110px; left: 10px; padding: 15px; background: rgba(0,0,0,0.7); color: white; border: 2px dashed #aaa; border-radius: 8px; font-size: 12px; z-index: 20; text-align: center; cursor: pointer; transition: all 0.2s; }
        #drop-zone:hover { background: rgba(255,255,255,0.1); border-color: #fff; }
        #file-input { display: none; }

        #vrm-meta-panel { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.75); padding: 12px; border-radius: 6px; font-size: 11px; border: 1px solid #444; min-width: 180px; z-index: 20; }
        #vrm-meta-panel h4 { margin: 0 0 6px 0; color: #00ffcc; font-size: 12px; border-bottom: 1px solid #444; padding-bottom: 4px; }
        .meta-line { margin: 3px 0; color: #ddd; }

        #loading { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15,15,15,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.4s; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: #00ffcc; animation: spin 1s linear infinite; margin-bottom: 20px; }
        #progress-percent { font-size: 36px; font-weight: bold; color: #00ffcc; font-family: monospace; margin-bottom: 10px; }
        #loading-text { color: #aaa; font-size: 13px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .color-picker-wrapper { display: flex; align-items: center; gap: 4px; }
        #bg-color-input { width: 22px; height: 18px; border: 1px solid #555; padding: 0; background: none; cursor: pointer; }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/@pixiv/three-vrm@0.6.7/lib/three-vrm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.umd.js"></script>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div id="progress-percent">0%</div>
        <div id="loading-text">システム高速初期化中...</div>
    </div>

    <div id="taskbar">
        <div class="taskbar-row">
            <div class="controls">
                <strong>vrm-tracker-lite</strong>
                <button id="btn-switch-camera" class="btn" style="border-color:#00ffcc;">📷 カメラ切替</button>
                <button id="btn-pip" class="btn">📌 小窓化 (PiP)</button>
            </div>

            <div class="controls">
                <span style="color:#aaa;">保存:</span>
                <button id="btn-screenshot" class="btn">📸 スクショ</button>
                <button id="btn-record" class="btn btn-rec">🔴 録画開始</button>
            </div>

            <div class="controls">
                <button id="toggle-video" class="btn">カメラ枠非表示</button>
                <div class="status-item"><span id="status-dot" class="status-dot"></span><span id="status-text">準備中</span></div>
            </div>
        </div>
        
        <div class="taskbar-row" style="border-top: 1px solid #333; padding-top: 4px;">
            <div class="controls" id="track-target-buttons">
                <span style="color:#aaa;">動かす場所:</span>
                <button class="btn" data-target="face">顔のみ</button>
                <button class="btn active" data-target="body">顔＋からだ（高速モード）</button>
            </div>
            <div class="controls" id="expression-buttons">
                <span style="color:#aaa;">表情:</span>
                <button class="btn active" data-exp="auto">自動</button>
                <button class="btn" data-exp="happy">喜</button>
                <button class="btn" data-exp="angry">怒</button>
                <button class="btn" data-exp="sad">哀</button>
                <button class="btn" data-exp="relaxed">楽</button>
            </div>
            <div class="controls">
                <span style="color:#aaa;">背景色:</span>
                <div class="color-picker-wrapper">
                    <input type="color" id="bg-color-input" value="#00ff00">
                    <button id="btn-bg-green" class="btn" style="padding:1px 4px; font-size:10px;">緑</button>
                    <button id="btn-bg-dark" class="btn" style="padding:1px 4px; font-size:10px;">暗</button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" accept=".vrm">
    <div id="drop-zone">ここにVRMファイルを<br>ドロップ または クリック</div>
    
    <div id="vrm-meta-panel">
        <h4>アバター情報</h4>
        <div class="meta-line">名前: <span id="meta-name">向きが分かるロボ</span></div>
        <div class="meta-line">作者: <span id="meta-author">System Generated</span></div>
    </div>

    <div id="video-container">
        <video id="video" autoplay playsinline muted style="width:160px; height:120px;"></video>
        <canvas id="overlay-canvas"></canvas>
    </div>
    
    <canvas id="canvas"></canvas>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const overlayCanvas = document.getElementById('overlay-canvas');
        const ctx = overlayCanvas.getContext('2d');
        
        const loadingElement = document.getElementById('loading');
        const progressPercent = document.getElementById('progress-percent');
        const loadingText = document.getElementById('loading-text');
        
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        
        const metaName = document.getElementById('meta-name');
        const metaAuthor = document.getElementById('meta-author');
        const bgColorInput = document.getElementById('bg-color-input');

        let currentVrm = null;
        let dummyVrm = null; 
        let isUsingDummy = true;
        let currentExpressionMode = "auto";
        let trackingTarget = "body"; 
        let cameraUtils = null;

        // 軽量な個別トラッカー群
        let faceMesh = null;
        let poseEstimator = null;

        // データ同期用のバッファ
        let latestFaceLandmarks = null;
        let latestPoseLandmarks = null;

        let videoDevices = [];
        let currentDeviceIndex = 0;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;

        function updateProgress(percent, text) {
            progressPercent.innerText = `${percent}%`;
            loadingText.innerText = text;
        }

        // 3Dシーン構築
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20.0);
        camera.position.set(0.0, 1.4, 0.55);

        const initBgColor = new THREE.Color(bgColorInput.value);
        const renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true, alpha: false, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));
        renderer.setClearColor(initBgColor, 1.0);
        document.body.style.background = bgColorInput.value;

        const light = new THREE.DirectionalLight(0xffffff, 1.0);
        light.position.set(1.0, 1.0, 1.0).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0.0, 1.4, 0.0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.1;
        controls.screenSpacePanning = true; 

        function createDummyAvatar() {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x444446, roughness: 0.4 });
            const faceMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc });
            
            const neckMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.025, 0.1), bodyMat);
            neckMesh.position.y = 1.25;
            group.add(neckMesh);

            const headGroup = new THREE.Group();
            headGroup.position.y = 1.4; 
            headGroup.add(new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.14, 0.14), bodyMat));

            const visor = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.04, 0.02), faceMat);
            visor.position.set(0, 0.02, 0.065);
            headGroup.add(visor);

            group.add(headGroup);
            scene.add(group);
            dummyVrm = { scene: group, head: headGroup, update: () => {} };
        }
        createDummyAvatar();

        // 🌟 描画＆AI追従メインループ（超高速・低負荷）
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            controls.update(); 

            // 毎フレーム、最新の顔・体データを安全にアバターへ適用
            processTrackingData();

            if (currentVrm) { currentVrm.update(delta); }
            renderer.render(scene, camera);
        }
        animate();

        function drawOverlay() {
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            ctx.fillStyle = "#00ffcc";
            if (latestFaceLandmarks) {
                // 間引きして軽量に描画
                for(let i=0; i<latestFaceLandmarks.length; i+=5) {
                    const pt = latestFaceLandmarks[i];
                    ctx.fillRect(pt.x * overlayCanvas.width - 1, pt.y * overlayCanvas.height - 1, 2, 2);
                }
            }
        }

        // 🌟 集約されたトラッキング計算処理（絶対にフリーズしない安全弁）
        function processTrackingData() {
            if (!latestFaceLandmarks && !latestPoseLandmarks) return;

            let riggedFace = null;
            let riggedPose = null;

            try {
                if (latestFaceLandmarks && latestFaceLandmarks.length > 0) {
                    riggedFace = Kalidokit.Face.solve(latestFaceLandmarks, { runtime: "mediapipe", video: videoElement });
                }
            } catch(e) {}

            try {
                if (latestPoseLandmarks && latestPoseLandmarks.length > 23) {
                    riggedPose = Kalidokit.Pose.solve(latestPoseLandmarks, null, { runtime: "mediapipe", video: videoElement });
                }
            } catch(e) {}

            if (isUsingDummy && dummyVrm && riggedFace) {
                dummyVrm.head.rotation.set(riggedFace.head.x, riggedFace.head.y, riggedFace.head.z);
                return;
            }

            if (currentVrm) {
                const humanoid = currentVrm.humanoid;
                
                // 顔の同期
                if (riggedFace) {
                    const head = humanoid?.getBoneNode('head');
                    const neck = humanoid?.getBoneNode('neck');
                    if (head) head.rotation.set(riggedFace.head.x, riggedFace.head.y, riggedFace.head.z);
                    if (neck) neck.rotation.set(riggedFace.head.x * 0.3, riggedFace.head.y * 0.3, riggedFace.head.z * 0.3);
                    
                    const target = currentVrm.blendShapeProxy;
                    if (target) {
                        if (currentExpressionMode === "auto") {
                            // ★【重要バグ修正】MediaPipe v0.10系での目の開閉フラグ反転を力技で補正 (1.0 - 数値)
                            const blinkL = Math.max(0, Math.min(1, 1.0 - (riggedFace.eye.l * 1.5)));
                            const blinkR = Math.max(0, Math.min(1, 1.0 - (riggedFace.eye.r * 1.5)));
                            
                            target.setValue('blink_l', blinkL);
                            target.setValue('blink_r', blinkR);
                            target.setValue('i', riggedFace.mouth.shape.I);
                            target.setValue('u', riggedFace.mouth.shape.U);
                            target.setValue('a', riggedFace.mouth.shape.A);
                        } else {
                            ['angry', 'fun', 'joy', 'sorrow'].forEach(exp => target.setValue(exp, exp === currentExpressionMode ? 1.0 : 0.0));
                        }
                    }
                }

                // からだの同期
                if (trackingTarget === "body" && riggedPose) {
                    const spine = humanoid?.getBoneNode('spine');
                    const chest = humanoid?.getBoneNode('chest');
                    const upperArmL = humanoid?.getBoneNode('leftUpperArm');
                    const upperArmR = humanoid?.getBoneNode('rightUpperArm');
                    const lowerArmL = humanoid?.getBoneNode('leftLowerArm');
                    const lowerArmR = humanoid?.getBoneNode('rightLowerArm');

                    if (spine) spine.rotation.set(riggedPose.spine.x, riggedPose.spine.y, riggedPose.spine.z);
                    if (chest) chest.rotation.set(riggedPose.spine.x * 0.5, riggedPose.spine.y * 0.5, riggedPose.spine.z * 0.5);
                    if (upperArmL) upperArmL.rotation.set(riggedPose.leftUpperArm.x, riggedPose.leftUpperArm.y, riggedPose.leftUpperArm.z);
                    if (upperArmR) upperArmR.rotation.set(riggedPose.rightUpperArm.x, riggedPose.rightUpperArm.y, riggedPose.rightUpperArm.z);
                    if (lowerArmL) lowerArmL.rotation.set(riggedPose.leftLowerArm.x, riggedPose.leftLowerArm.y, riggedPose.leftLowerArm.z);
                    if (lowerArmR) lowerArmR.rotation.set(riggedPose.rightLowerArm.x, riggedPose.rightLowerArm.y, riggedPose.rightLowerArm.z);
                }
            }
        }

        function loadVRM(url) {
            return new Promise((resolve, reject) => {
                try {
                    const loader = new THREE.GLTFLoader();
                    loader.crossOrigin = 'anonymous';
                    loader.load(url, (gltf) => {
                        THREE_VRM.VRM.from(gltf).then((vrm) => {
                            if (dummyVrm && isUsingDummy) {
                                scene.remove(dummyVrm.scene);
                                isUsingDummy = false;
                            }
                            if (currentVrm) {
                                scene.remove(currentVrm.scene);
                                currentVrm.dispose();
                            }

                            currentVrm = vrm;
                            scene.add(vrm.scene);

                            // 初期デフォルトAポーズ固定
                            const humanoid = vrm.humanoid;
                            if (humanoid) {
                                const leftUpperArm = humanoid.getBoneNode('leftUpperArm');
                                const rightUpperArm = humanoid.getBoneNode('rightUpperArm');
                                if (leftUpperArm) leftUpperArm.rotation.set(0, 0, 1.2); 
                                if (rightUpperArm) rightUpperArm.rotation.set(0, 0, -1.2);
                            }

                            const head = vrm.humanoid?.getBoneNode('head');
                            if(head) {
                                const headWorldPos = new THREE.Vector3();
                                head.getWorldPosition(headWorldPos);
                                controls.target.set(0.0, headWorldPos.y, 0.0);
                                camera.position.set(0.0, headWorldPos.y, 0.55);
                            }

                            metaName.innerText = vrm.meta?.title || "未設定";
                            metaAuthor.innerText = vrm.meta?.author || "未設定";
                            resolve(vrm);
                        }).catch(e => reject(e));
                    }, undefined, (err) => reject(err));
                } catch (e) { reject(e); }
            });
        }

        // 🌟 独立した2つの軽量エンジンを爆速初期化
        async function initializeSystem() {
            loadingElement.style.display = 'flex';
            
            updateProgress(20, "軽量顔トラッカーを起動中...");
            faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            faceMesh.onResults((results) => {
                latestFaceLandmarks = results.multiFaceLandmarks ? results.multiFaceLandmarks[0] : null;
                if (overlayCanvas.width !== videoElement.videoWidth) {
                    overlayCanvas.width = videoElement.videoWidth;
                    overlayCanvas.height = videoElement.videoHeight;
                }
                drawOverlay();
            });

            updateProgress(50, "軽量姿勢トラッカーを起動中...");
            poseEstimator = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
            poseEstimator.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 }); // Complexity 0 で最軽量化
            poseEstimator.onResults((results) => {
                latestPoseLandmarks = results.poseLandmarks || null;
            });

            updateProgress(70, "利用可能なカメラをスキャン中...");
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(d => d.kind === 'videoinput');
            } catch (e) {}

            await startCameraStream();
        }

        async function startCameraStream(deviceId = null) {
            updateProgress(85, "カメラ映像ストリームを同期中...");
            if (cameraUtils) { await cameraUtils.stop(); }

            // 画質を小さく（320x240）固定してAIの負荷を極限までカット
            cameraUtils = new Camera(videoElement, {
                onFrame: async () => {
                    // 両方のトラッカーへ同時に映像を流し込む
                    await Promise.all([
                        faceMesh.send({ image: videoElement }),
                        poseEstimator.send({ image: videoElement })
                    ]);
                },
                width: 320,
                height: 240,
                deviceId: deviceId
            });

            try {
                await cameraUtils.start();
                updateProgress(100, "すべてのシステムが軽量稼働しました！");
                setTimeout(() => {
                    loadingElement.style.opacity = '0';
                    setTimeout(() => loadingElement.style.display = 'none', 400);
                }, 400);
                statusDot.className = "status-dot active";
                statusText.innerText = `軽量快適モード`;
            } catch (e) {
                updateProgress(0, "カメラ起動エラー");
            }
        }

        // カメラ切り替え
        document.getElementById('btn-switch-camera').addEventListener('click', async () => {
            if (videoDevices.length <= 1) return;
            currentDeviceIndex = (currentDeviceIndex + 1) % videoDevices.length;
            await startCameraStream(videoDevices[currentDeviceIndex].deviceId);
        });

        // 背景色
        bgColorInput.addEventListener('input', (e) => {
            renderer.setClearColor(new THREE.Color(e.target.value), 1.0);
            document.body.style.background = e.target.value;
        });
        document.getElementById('btn-bg-green').addEventListener('click', () => {
            bgColorInput.value = "#00ff00";
            renderer.setClearColor(new THREE.Color("#00ff00"), 1.0);
            document.body.style.background = "#00ff00";
        });
        document.getElementById('btn-bg-dark').addEventListener('click', () => {
            bgColorInput.value = "#1a1a1a";
            renderer.setClearColor(new THREE.Color("#1a1a1a"), 1.0);
            document.body.style.background = "#1a1a1a";
        });

        // スクショ
        document.getElementById('btn-screenshot').addEventListener('click', () => {
            renderer.render(scene, camera);
            const link = document.createElement('a');
            link.download = `avatar_${Date.now()}.png`;
            link.href = canvasElement.toDataURL('image/png');
            link.click();
        });

        // 録画
        const recordBtn = document.getElementById('btn-record');
        recordBtn.addEventListener('click', () => {
            if (!isRecording) {
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(canvasElement.captureStream(30), { mimeType: 'video/webm;codecs=vp9' });
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const link = document.createElement('a');
                    link.download = `avatar_movie_${Date.now()}.webm`;
                    link.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/webm' }));
                    link.click();
                };
                mediaRecorder.start();
                isRecording = true;
                recordBtn.innerText = "⏹️ 録画停止";
                recordBtn.classList.add('active');
            } else {
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.innerText = "🔴 録画開始";
                recordBtn.classList.remove('active');
            }
        });

        // PiP
        document.getElementById('btn-pip').addEventListener('click', async () => {
            try {
                const pipVideo = document.createElement('video');
                pipVideo.muted = true;
                pipVideo.srcObject = canvasElement.captureStream(30);
                pipVideo.play();
                pipVideo.addEventListener('loadedmetadata', async () => { await pipVideo.requestPictureInPicture(); });
            } catch (e) {}
        });

        // トラッキング部位
        document.getElementById('track-target-buttons').addEventListener('click', (e) => {
            if (e.target.classList.contains('btn')) {
                document.querySelectorAll('#track-target-buttons .btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                trackingTarget = e.target.getAttribute('data-target');
            }
        });

        // 表情
        document.getElementById('expression-buttons').addEventListener('click', (e) => {
            if (e.target.classList.contains('btn')) {
                document.querySelectorAll('#expression-buttons .btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentExpressionMode = e.target.getAttribute('data-exp');
            }
        });

        // ファイルドロップ
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => processFile(e.target.files[0]));
        window.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = 'rgba(0, 255, 204, 0.2)'; });
        window.addEventListener('dragleave', () => dropZone.style.background = 'rgba(0,0,0,0.7)');
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.background = 'rgba(0,0,0,0.7)';
            if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]);
        });

        function processFile(file) {
            if (!file || !file.name.toLowerCase().endsWith('.vrm')) return;
            const reader = new FileReader();
            reader.onload = (e) => { loadVRM(e.target.result).catch(() => {}); };
            reader.readAsDataURL(file);
        }

        document.getElementById('toggle-video').addEventListener('click', () => {
            const container = document.getElementById('video-container');
            container.style.opacity = container.style.opacity === '0' ? '1' : '0';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initializeSystem();
    </script>
</body>
</html>
