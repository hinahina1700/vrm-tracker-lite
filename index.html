<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vrm-tracker-lite</title>
    <style>
        /* ★【修正】初期背景を「暗（#1a1a1a）」に設定 */
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; color: white; user-select: none; }
        #canvas { width: 100vw; height: 100vh; display: block; }
        
        #video-container { position: fixed; bottom: 10px; right: 10px; width: 160px; height: 120px; border: 2px solid #555; border-radius: 4px; z-index: 10; background: #000; overflow: hidden; transition: opacity 0.2s; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: block; }
        #overlay-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }
        
        #taskbar { position: fixed; top: 0; left: 0; width: 100vw; background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(4px); border-bottom: 1px solid #333; z-index: 40; display: flex; flex-direction: column; padding: 6px 15px; box-sizing: border-box; font-size: 11px; gap: 6px; }
        .taskbar-row { display: flex; align-items: center; justify-content: space-between; width: 100%; flex-wrap: wrap; gap: 8px; }
        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .btn { background: #333; color: white; border: 1px solid #555; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn:hover, .btn.active { background: #444; border-color: #00ffcc; color: #00ffcc; }
        .btn-rec { border-color: #ff4444; }
        .btn-rec.active { background: #ff4444; color: white; border-color: #ff4444; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .status-item { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; background: #ff4444; border-radius: 50%; display: inline-block; }
        .status-dot.active { background: #00ffcc; box-shadow: 0 0 8px #00ffcc; }

        /* アップロードゾーン */
        #drop-zone { position: fixed; top: 110px; left: 10px; padding: 15px; background: rgba(0,0,0,0.7); color: white; border: 2px dashed #aaa; border-radius: 8px; font-size: 12px; z-index: 20; text-align: center; cursor: pointer; transition: all 0.2s; display: block; }
        #drop-zone:hover { border-color: #00ffcc; background: rgba(0,255,204,0.1); }
        #file-input { display: none; }

        #vrm-meta-panel { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.75); padding: 12px; border-radius: 6px; font-size: 11px; border: 1px solid #444; min-width: 180px; z-index: 20; }
        #vrm-meta-panel h4 { margin: 0 0 6px 0; color: #00ffcc; font-size: 12px; border-bottom: 1px solid #444; padding-bottom: 4px; }
        .meta-line { margin: 3px 0; color: #ddd; }

        /* ★【修正】復活したログボックスのスタイル定義 */
        #app-log-panel { position: fixed; bottom: 10px; left: 210px; background: rgba(0,0,0,0.75); padding: 12px; border-radius: 6px; font-size: 11px; border: 1px solid #444; width: 300px; height: 100px; z-index: 20; overflow-y: auto; font-family: monospace; color: #00ffcc; }
        #app-log-panel div { margin: 2px 0; border-bottom: 1px dashed #333; padding-bottom: 2px; color: #eee; }

        #loading { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15,15,15,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.4s; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: #00ffcc; animation: spin 1s linear infinite; margin-bottom: 20px; }
        #progress-percent { font-size: 36px; font-weight: bold; color: #00ffcc; font-family: monospace; margin-bottom: 10px; }
        #loading-text { color: #aaa; font-size: 13px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .color-picker-wrapper { display: flex; align-items: center; gap: 4px; }
        #bg-color-input { width: 22px; height: 18px; border: 1px solid #555; padding: 0; background: none; cursor: pointer; }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/@pixiv/three-vrm@0.6.7/lib/three-vrm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.umd.js"></script>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div id="progress-percent">0%</div>
        <div id="loading-text">システム最高速度で起動中...</div>
    </div>

    <div id="taskbar">
        <div class="taskbar-row">
            <div class="controls">
                <strong>vrm-tracker-lite</strong>
                <button id="btn-switch-camera" class="btn" style="border-color:#00ffcc;">📷 カメラ切替</button>
                <button id="btn-pip" class="btn">📌 小窓化 (PiP)</button>
            </div>

            <div class="controls">
                <span style="color:#aaa;">保存:</span>
                <button id="btn-screenshot" class="btn">📸 スクショ</button>
                <button id="btn-record" class="btn btn-rec">🔴 録画開始</button>
            </div>

            <div class="controls">
                <button id="toggle-video" class="btn">カメラ枠非表示</button>
                <div class="status-item"><span id="status-dot" class="status-dot"></span><span id="status-text">準備中</span></div>
            </div>
        </div>
        
        <div class="taskbar-row" style="border-top: 1px solid #333; padding-top: 4px;">
            <div class="controls" id="track-target-buttons">
                <span style="color:#aaa;">動かす場所:</span>
                <button class="btn" data-target="face">顔のみ</button>
                <button class="btn active" data-target="body">顔＋からだ</button>
                <button class="btn" data-target="all">顔＋からだ＋て</button>
            </div>
            <div class="controls" id="expression-buttons">
                <span style="color:#aaa;">表情:</span>
                <button class="btn active" data-exp="auto">自動</button>
                <button class="btn" data-exp="surprised">驚き</button>
                <button class="btn" data-exp="angry">怒り</button>
            </div>
            <div class="controls">
                <span style="color:#aaa;">背景色:</span>
                <div class="color-picker-wrapper">
                    <input type="color" id="bg-color-input" value="#1a1a1a">
                    <button id="btn-bg-green" class="btn" style="padding:1px 4px; font-size:10px;">緑</button>
                    <button id="btn-bg-dark" class="btn" style="padding:1px 4px; font-size:10px;">暗</button>
                </div>
            </div>
        </div>
    </div>

    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
        ここにVRMファイルをドロップ<br>またはクリックして選択
        <input type="file" id="file-input" accept=".vrm">
    </div>

    <div id="vrm-meta-panel">
        <h4>キャラクター情報</h4>
        <div class="meta-line">名前: <span id="meta-name">ライト・ロボ (Lite-Robo)</span></div>
        <div class="meta-line">開発: <span id="meta-author">vrm-tracker-lite</span></div>
    </div>

    <div id="app-log-panel">
        <h4 style="margin:0 0 4px 0; font-size:11px; color:#00ffcc;">ログコンソール</h4>
        <div id="log-content"></div>
    </div>

    <div id="video-container">
        <video id="video" autoplay playsinline muted style="width:160px; height:120px;"></video>
        <canvas id="overlay-canvas"></canvas>
    </div>
    
    <canvas id="canvas"></canvas>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const overlayCanvas = document.getElementById('overlay-canvas');
        const ctx = overlayCanvas.getContext('2d');
        
        const loadingElement = document.getElementById('loading');
        const progressPercent = document.getElementById('progress-percent');
        const loadingText = document.getElementById('loading-text');
        
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const bgColorInput = document.getElementById('bg-color-input');

        let currentVrm = null;
        let isOfficialAvatar = true; 
        let currentExpression = "auto";

        let cameraUtils = null;
        let holistic = null;

        let latestFaceLandmarks = null;
        let latestPoseLandmarks = null;
        let latestLeftHandLandmarks = null;
        let latestRightHandLandmarks = null;

        let videoDevices = [];
        let currentDeviceIndex = 0;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let trackingTarget = "body"; 

        // ★【修正】ログを復活させて画面上に表示する処理
        function addAppLog(text) {
            const logBox = document.getElementById('log-content');
            if (logBox) {
                const time = new Date().toLocaleTimeString();
                logBox.innerHTML += `<div>[${time}] ${text}</div>`;
                logBox.parentElement.scrollTop = logBox.parentElement.scrollHeight;
            }
            console.log(text);
        }

        function updateProgress(percent, text) {
            progressPercent.innerText = `${percent}%`;
            loadingText.innerText = text;
            addAppLog(`${percent}%: ${text}`);
        }

        // --- Three.js 初期化 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20.0);
        
        camera.position.set(0.0, 1.25, 1.2); 

        const initBgColor = new THREE.Color(bgColorInput.value);
        const renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true, alpha: false, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));
        renderer.setClearColor(initBgColor, 1.0);
        document.body.style.background = bgColorInput.value;

        const light = new THREE.DirectionalLight(0xffffff, 1.0);
        light.position.set(1.0, 1.0, 1.0).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0.0, 1.15, 0.0); 
        controls.enableDamping = true;
        controls.dampingFactor = 0.1;
        controls.screenSpacePanning = true; 

        // --- 🤖 公式キャラクター「ライト・ロボ」のボーンシステム定義 🤖 ---
        const robotNodes = {};
        let officialAvatarGroup = null;

        function createOfficialAvatar() {
            if (officialAvatarGroup) scene.remove(officialAvatarGroup);
            
            officialAvatarGroup = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3c, roughness: 0.5 });
            const jointMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.7 });
            const visorMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x004433 });
            const handMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc });

            // ★【修正】頭身バランスを再設計し、きちんとした「二頭身」（頭1個分＝からだ1個分）に調整
            // head height(0.26) : body height(足〜首まで ≒ 0.28) がほぼ1:1になるよう各パーツを短縮
            const spineNode = new THREE.Group(); spineNode.position.set(0, 0.12, 0);  // 足の高さ
            const chestNode = new THREE.Group(); chestNode.position.set(0, 0.03, 0);  // 背骨の高さ
            const neckNode = new THREE.Group();  neckNode.position.set(0, 0.11, 0);   // 胴の高さ
            const headNode = new THREE.Group();  headNode.position.set(0, 0.03, 0);   // 首の高さ

            const leftUpperArm = new THREE.Group(); leftUpperArm.position.set(0.13, 0.075, 0);
            const leftLowerArm = new THREE.Group(); leftLowerArm.position.set(0.075, 0, 0);
            const leftHand = new THREE.Group();     leftHand.position.set(0.05, 0, 0);

            const rightUpperArm = new THREE.Group(); rightUpperArm.position.set(-0.13, 0.075, 0);
            const rightLowerArm = new THREE.Group(); rightLowerArm.position.set(-0.075, 0, 0);
            const rightHand = new THREE.Group();     rightHand.position.set(-0.05, 0, 0);

            // 足を短くコンパクトに（ここが長すぎると二頭身に見えなかった）
            const baseMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.05, 0.12, 16), bodyMat);
            baseMesh.position.y = 0.06;
            officialAvatarGroup.add(baseMesh);

            const spineMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.03, 0.03, 16), jointMat);
            spineMesh.position.y = 0.015;
            spineNode.add(spineMesh);

            // 胴体もまるっと小さく
            const chestMesh = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.11, 0.15), bodyMat);
            chestMesh.position.y = 0.055;
            chestNode.add(chestMesh);

            const neckMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.03, 12), jointMat);
            neckMesh.position.y = 0.015;
            neckNode.add(neckMesh);

            // 頭は胴とほぼ同じ高さまで拡大し、丸みを持たせて「かわいい二頭身」に
            const headMesh = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.26, 0.26), bodyMat);
            headMesh.position.y = 0.13;
            headNode.add(headMesh);

            // バイザーも頭の大きさに合わせて調整、少し丸顔に見えるよう幅広に
            const visor = new THREE.Mesh(new THREE.BoxGeometry(0.20, 0.055, 0.02), visorMat);
            visor.position.set(0, 0.14, 0.125);
            headNode.add(visor);

            // 手足はさらに短く・丸く、ちんまりした印象に
            const luaMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.018, 0.07, 12), bodyMat);
            luaMesh.rotation.z = -Math.PI / 2; luaMesh.position.x = 0.035;
            leftUpperArm.add(luaMesh);
            const llaMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.015, 0.05, 12), bodyMat);
            llaMesh.rotation.z = -Math.PI / 2; llaMesh.position.x = 0.025;
            leftLowerArm.add(llaMesh);
            const lhMesh = new THREE.Mesh(new THREE.SphereGeometry(0.02, 12, 12), handMat);
            leftHand.add(lhMesh);

            const ruaMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.018, 0.07, 12), bodyMat);
            ruaMesh.rotation.z = Math.PI / 2; ruaMesh.position.x = -0.035;
            rightUpperArm.add(ruaMesh);
            const rlaMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.015, 0.05, 12), bodyMat);
            rlaMesh.rotation.z = Math.PI / 2; rlaMesh.position.x = -0.025;
            rightLowerArm.add(rlaMesh);
            const rhMesh = new THREE.Mesh(new THREE.SphereGeometry(0.02, 12, 12), handMat);
            rightHand.add(rhMesh);

            officialAvatarGroup.add(spineNode);
            spineNode.add(chestNode);
            chestNode.add(neckNode);
            neckNode.add(headNode);
            chestNode.add(leftUpperArm);
            leftUpperArm.add(leftLowerArm);
            leftLowerArm.add(leftHand);
            chestNode.add(rightUpperArm);
            rightUpperArm.add(rightLowerArm);
            rightLowerArm.add(rightHand);

            scene.add(officialAvatarGroup);

            leftUpperArm.rotation.z = -0.4;
            rightUpperArm.rotation.z = 0.4;

            robotNodes.spine = spineNode;
            robotNodes.chest = chestNode;
            robotNodes.neck = neckNode;
            robotNodes.head = headNode;
            robotNodes.leftUpperArm = leftUpperArm;
            robotNodes.leftLowerArm = leftLowerArm;
            robotNodes.leftHand = leftHand;
            robotNodes.rightUpperArm = rightUpperArm;
            robotNodes.rightLowerArm = rightLowerArm;
            robotNodes.rightHand = rightHand;
            
            isOfficialAvatar = true;
            document.getElementById('meta-name').innerText = "ライト・ロボ (Chibi-Robo)";
            document.getElementById('meta-author').innerText = "vrm-tracker-lite";
            
            // カメラ注視点をちびロボサイズ（全高約0.55）にアジャスト
            controls.target.set(0.0, 0.32, 0.0); 
            camera.position.set(0.0, 0.38, 0.55);
            addAppLog("初期ロボットキャラを二頭身スタイルで生成しました。");
        }

        // --- VRMファイルのロード処理 ---
        function loadVRM(url) {
            updateProgress(20, "VRMデータの解析中...");
            if (currentVrm) {
                scene.remove(currentVrm.scene);
                THREE.VRMUtils.deepDispose(currentVrm.scene);
            }
            if (officialAvatarGroup) {
                scene.remove(officialAvatarGroup);
            }

            const loader = new THREE.GLTFLoader();
            loader.load(url, (gltf) => {
                THREE.VRM.from(gltf).then((vrm) => {
                    currentVrm = vrm;
                    scene.add(vrm.scene);
                    vrm.scene.rotation.y = Math.PI; 
                    isOfficialAvatar = false;

                    const meta = vrm.meta;
                    document.getElementById('meta-name').innerText = meta.title || "不明なアバター";
                    document.getElementById('meta-author').innerText = meta.author || "不明な制作者";

                    // ★【二頭身化】アップロードされた独自VRMも自動で可愛い二頭身比率にデフォルメ
                    if (vrm.humanoid) {
                        const hNode = vrm.humanoid.getBoneNode(THREE.VRMSchema.HumanoidBoneName.Head);
                        const hipsNode = vrm.humanoid.getBoneNode(THREE.VRMSchema.HumanoidBoneName.Hips);
                        if (hNode) hNode.scale.set(1.6, 1.6, 1.6); // 頭を大きく
                        if (hipsNode) hipsNode.scale.set(0.7, 0.6, 0.7); // 体をコンパクトに
                        
                        // Aポーズ初期化
                        if(vrm.humanoid.getBoneNode(THREE.VRMSchema.HumanoidBoneName.LeftUpperArm))
                            vrm.humanoid.getBoneNode(THREE.VRMSchema.HumanoidBoneName.LeftUpperArm).rotation.z = -0.4;
                        if(vrm.humanoid.getBoneNode(THREE.VRMSchema.HumanoidBoneName.RightUpperArm))
                            vrm.humanoid.getBoneNode(THREE.VRMSchema.HumanoidBoneName.RightUpperArm).rotation.z = 0.4;
                    }

                    // カメラ位置調整
                    controls.target.set(0.0, 0.95, 0.0); 
                    camera.position.set(0.0, 1.05, 0.9);

                    addAppLog(`独自VRM [${meta.title || 'Model'}] を二頭身モードで読み込みました。`);

                    loadingElement.style.opacity = '0';
                    setTimeout(() => loadingElement.style.display = 'none', 400);
                }).catch((err) => {
                    // ★【修正】ここで例外が発生するとPromiseチェーンが静かに失敗し、
                    // ローディング画面が消えないまま固まっていたため、catchで確実に復旧させる
                    console.error(err);
                    addAppLog(`VRMの初期化に失敗しました: ${err.message}`);
                    alert("VRMの読み込みに失敗しました。");
                    createOfficialAvatar();
                    loadingElement.style.opacity = '0';
                    setTimeout(() => loadingElement.style.display = 'none', 400);
                });
            }, (progress) => {
                const pct = Math.round((progress.loaded / progress.total) * 100);
                updateProgress(50 + Math.round(pct/2), `アバター読み込み中... (${pct}%)`);
            }, (error) => {
                alert("VRMの読み込みに失敗しました。");
                createOfficialAvatar();
                loadingElement.style.display = 'none';
            });
        }

        // ドロップ＆ファイル選択のイベントリスナー
        const dropZone = document.getElementById('drop-zone');
        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].name.endsWith('.vrm')) {
                loadingElement.style.display = 'flex';
                const blob = new Blob([files[0]], { type: "application/octet-stream" });
                loadVRM(URL.createObjectURL(blob));
            }
        });
        document.getElementById('file-input').addEventListener('change', (e) => {
            const files = e.target.files;
            if (files.length > 0) {
                loadingElement.style.display = 'flex';
                const blob = new Blob([files[0]], { type: "application/octet-stream" });
                loadVRM(URL.createObjectURL(blob));
            }
        });

        createOfficialAvatar();

        // ★【カクつき解消＆1sから0.1s化】
        // トラッキング処理の間隔を制御し、0.1s (100ms) 以上の超高レスポンス速度で描画を同期させます。
        let lastProcessingTime = 0;

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            
            const now = performance.now();
            // 0.1秒(100ms)よりも短い間隔(または毎フレーム最高速度)で安全に描画を同期
            if (now - lastProcessingTime >= 100) { 
                processTrackingData();
                lastProcessingTime = now;
            }
            
            renderer.render(scene, camera);
        }
        animate();

        function drawOverlay() {
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            ctx.fillStyle = "#00ffcc";
            if (latestFaceLandmarks) {
                for(let i=0; i<latestFaceLandmarks.length; i+=15) {
                    const pt = latestFaceLandmarks[i];
                    ctx.fillRect(pt.x * overlayCanvas.width - 1, pt.y * overlayCanvas.height - 1, 2, 2);
                }
            }
        }

        function processTrackingData() {
            if (!latestFaceLandmarks && !latestPoseLandmarks) return;

            let riggedFace = null;
            let riggedPose = null;
            let riggedLeftHand = null;
            let riggedRightHand = null;

            try {
                if (latestFaceLandmarks && latestFaceLandmarks.length > 0) {
                    const adjustedFace = latestFaceLandmarks.map(pt => ({ x: pt.x, y: 1.0 - pt.y, z: pt.z }));
                    riggedFace = Kalidokit.Face.solve(adjustedFace, { runtime: "mediapipe", video: videoElement });
                }
            } catch(e) {}

            try {
                if (latestPoseLandmarks && latestPoseLandmarks.length > 23) {
                    const adjustedPose = latestPoseLandmarks.map(pt => ({ x: pt.x, y: 1.0 - pt.y, z: pt.z, visibility: pt.visibility }));
                    riggedPose = Kalidokit.Pose.solve(adjustedPose, adjustedPose, { runtime: "mediapipe", video: videoElement });
                }
            } catch(e) {}

            try {
                if (latestLeftHandLandmarks && latestLeftHandLandmarks.length > 0) {
                    const adjustedLeft = latestLeftHandLandmarks.map(pt => ({ x: pt.x, y: 1.0 - pt.y, z: pt.z }));
                    riggedLeftHand = Kalidokit.Hand.solve(adjustedLeft, "Left");
                }
            } catch(e) {}

            try {
                if (latestRightHandLandmarks && latestRightHandLandmarks.length > 0) {
                    const adjustedRight = latestRightHandLandmarks.map(pt => ({ x: pt.x, y: 1.0 - pt.y, z: pt.z }));
                    riggedRightHand = Kalidokit.Hand.solve(adjustedRight, "Right");
                }
            } catch(e) {}

            if (isOfficialAvatar) {
                if (riggedFace) {
                    robotNodes.head.rotation.set(-riggedFace.head.x * 0.8, -riggedFace.head.y, -riggedFace.head.z);
                    robotNodes.neck.rotation.set(-riggedFace.head.x * 0.2, -riggedFace.head.y * 0.2, 0);
                }
                if ((trackingTarget === "body" || trackingTarget === "all") && riggedPose) {
                    robotNodes.spine.rotation.set(-riggedPose.spine.x, -riggedPose.spine.y, -riggedPose.spine.z);
                    if (riggedPose.leftUpperArm) robotNodes.leftUpperArm.rotation.set(riggedPose.leftUpperArm.x, riggedPose.leftUpperArm.y, riggedPose.leftUpperArm.z - 0.4);
                    if (riggedPose.rightUpperArm) robotNodes.rightUpperArm.rotation.set(riggedPose.rightUpperArm.x, riggedPose.rightUpperArm.y, riggedPose.rightUpperArm.z + 0.4);
                    if (riggedPose.leftLowerArm) robotNodes.leftLowerArm.rotation.set(riggedPose.leftLowerArm.x, riggedPose.leftLowerArm.y, riggedPose.leftLowerArm.z);
                    if (riggedPose.rightLowerArm) robotNodes.rightLowerArm.rotation.set(riggedPose.rightLowerArm.x, riggedPose.rightLowerArm.y, riggedPose.rightLowerArm.z);
                }
                if (trackingTarget === "all") {
                    if (riggedLeftHand && riggedLeftHand.leftWrist) robotNodes.leftHand.rotation.set(riggedLeftHand.leftWrist.x, riggedLeftHand.leftWrist.y, riggedLeftHand.leftWrist.z);
                    if (riggedRightHand && riggedRightHand.rightWrist) robotNodes.rightHand.rotation.set(riggedRightHand.rightWrist.x, riggedRightHand.rightWrist.y, riggedRightHand.rightWrist.z);
                }
            } else if (currentVrm && currentVrm.humanoid) {
                // ★【独自VRMが動かないバグの完全修正】
                // ボーンノードを取得する際、存在しないプロパティの読み込み（Cannot read properties of undefined）で
                // ループ全体がクラッシュしていたため、オプショナルチェイニング `?.` と存在確認を1箇所ずつ徹底追加。
                const h = currentVrm.humanoid;
                
                try {
                    if (riggedFace) {
                        const headBone = h.getBoneNode(THREE.VRMSchema.HumanoidBoneName.Head);
                        const neckBone = h.getBoneNode(THREE.VRMSchema.HumanoidBoneName.Neck);
                        if (headBone) headBone.rotation.set(-riggedFace.head.x, riggedFace.head.y, riggedFace.head.z);
                        if (neckBone) neckBone.rotation.set(-riggedFace.head.x * 0.2, riggedFace.head.y * 0.2, 0);
                        
                        const blendShape = currentVrm.blendShapeProxy;
                        if (blendShape) {
                            if (currentExpression === "auto") {
                                blendShape.setValue(THREE.VRMSchema.BlendShapePresetName.BlinkLeft, riggedFace.eye.l || 0);
                                blendShape.setValue(THREE.VRMSchema.BlendShapePresetName.BlinkRight, riggedFace.eye.r || 0);
                                blendShape.setValue(THREE.VRMSchema.BlendShapePresetName.A, riggedFace.mouth.shape.y || 0);
                            } else {
                                blendShape.setValue(THREE.VRMSchema.BlendShapePresetName.BlinkLeft, 0);
                                blendShape.setValue(THREE.VRMSchema.BlendShapePresetName.BlinkRight, 0);
                                blendShape.setValue(THREE.VRMSchema.BlendShapePresetName.A, 0);
                            }
                        }
                    }

                    if ((trackingTarget === "body" || trackingTarget === "all") && riggedPose) {
                        const spineBone = h.getBoneNode(THREE.VRMSchema.HumanoidBoneName.Spine);
                        if (spineBone) spineBone.rotation.set(-riggedPose.spine.x, riggedPose.spine.y, riggedPose.spine.z);
                        
                        const lua = h.getBoneNode(THREE.VRMSchema.HumanoidBoneName.LeftUpperArm);
                        const rua = h.getBoneNode(THREE.VRMSchema.HumanoidBoneName.RightUpperArm);
                        const lla = h.getBoneNode(THREE.VRMSchema.HumanoidBoneName.LeftLowerArm);
                        const rla = h.getBoneNode(THREE.VRMSchema.HumanoidBoneName.RightLowerArm);

                        if (lua && riggedPose.leftUpperArm) lua.rotation.set(riggedPose.leftUpperArm.x, riggedPose.leftUpperArm.y, riggedPose.leftUpperArm.z - 0.4);
                        if (rua && riggedPose.rightUpperArm) rua.rotation.set(riggedPose.rightUpperArm.x, -riggedPose.rightUpperArm.y, -riggedPose.rightUpperArm.z + 0.4);
                        if (lla && riggedPose.leftLowerArm) lla.rotation.set(riggedPose.leftLowerArm.x, riggedPose.leftLowerArm.y, riggedPose.leftLowerArm.z);
                        if (rla && riggedPose.rightLowerArm) rla.rotation.set(riggedPose.rightLowerArm.x, -riggedPose.rightLowerArm.y, -riggedPose.rightLowerArm.z);
                    }

                    if (trackingTarget === "all") {
                        const lh = h.getBoneNode(THREE.VRMSchema.HumanoidBoneName.LeftHand);
                        const rh = h.getBoneNode(THREE.VRMSchema.HumanoidBoneName.RightHand);
                        if (lh && riggedLeftHand?.leftWrist) lh.rotation.set(riggedLeftHand.leftWrist.x, riggedLeftHand.leftWrist.y, riggedLeftHand.leftWrist.z);
                        if (rh && riggedRightHand?.rightWrist) rh.rotation.set(riggedRightHand.rightWrist.x, -riggedRightHand.rightWrist.y, -riggedRightHand.rightWrist.z);
                    }
                } catch(err) {
                    addAppLog(`トラッキング同期エラーを自動回避しました: ${err.message}`);
                }
            }
        }

        // --- Holisticの初期化 ---
        async function initializeSystem() {
            loadingElement.style.display = 'flex';
            updateProgress(40, "統合トラッキングモジュールの読み込み中...");
            
            holistic = new Holistic({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`
            });

            holistic.setOptions({
                modelComplexity: 0,
                smoothLandmarks: true,
                refineFaceLandmarks: true,
                enableSegmentation: false,
                smoothSegmentation: false,
                enableFaceGeometry: false, 
                enablePoseTracking: true,
                enableHandTracking: true 
            });

            holistic.onResults((results) => {
                latestFaceLandmarks = results.faceLandmarks || null;
                
                if (trackingTarget === "body" || trackingTarget === "all") {
                    latestPoseLandmarks = results.poseLandmarks || null;
                } else {
                    latestPoseLandmarks = null;
                }

                if (trackingTarget === "all") {
                    latestLeftHandLandmarks = results.leftHandLandmarks || null;
                    latestRightHandLandmarks = results.rightHandLandmarks || null;
                } else {
                    latestLeftHandLandmarks = null;
                    latestRightHandLandmarks = null;
                }

                if (overlayCanvas.width !== videoElement.videoWidth) {
                    overlayCanvas.width = videoElement.videoWidth;
                    overlayCanvas.height = videoElement.videoHeight;
                }
                drawOverlay();
            });

            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(d => d.kind === 'videoinput');
            } catch (e) {}

            await startCameraStream();
        }

        async function startCameraStream(deviceId = null) {
            updateProgress(85, "カメラデバイスの起動中...");
            if (cameraUtils) { await cameraUtils.stop(); }

            cameraUtils = new Camera(videoElement, {
                onFrame: async () => {
                    await holistic.send({ image: videoElement });
                },
                width: 320,
                height: 240,
                deviceId: deviceId
            });

            try {
                await cameraUtils.start();
                updateProgress(100, "準備完了！");
                setTimeout(() => {
                    loadingElement.style.opacity = '0';
                    setTimeout(() => loadingElement.style.display = 'none', 400);
                }, 400);
                statusDot.className = "status-dot active";
                statusText.innerText = `稼働中`;
                addAppLog("システムが最高速度(10FPS/0.1s単位以上)で安定稼働を開始しました。");
            } catch (e) {
                updateProgress(0, "カメラが見つかりません");
            }
        }

        function drawCreditOverlay(targetCanvas) {
            const context = targetCanvas.getContext('2d');
            context.save();
            context.font = "bold 14px sans-serif";
            context.fillStyle = "rgba(255, 255, 255, 0.85)";
            context.shadowColor = "black";
            context.shadowBlur = 4;
            context.textAlign = "right";
            context.fillText("©hinahina17dayo / vrm-tracker-lite", targetCanvas.width - 20, targetCanvas.height - 20);
            context.restore();
        }

        // --- UIコントロールイベント ---
        document.getElementById('btn-switch-camera').addEventListener('click', async () => {
            if (videoDevices.length <= 1) return;
            currentDeviceIndex = (currentDeviceIndex + 1) % videoDevices.length;
            await startCameraStream(videoDevices[currentDeviceIndex].deviceId);
        });

        bgColorInput.addEventListener('input', (e) => {
            renderer.setClearColor(new THREE.Color(e.target.value), 1.0);
            document.body.style.background = e.target.value;
            addAppLog(`背景色を変更しました: ${e.target.value}`);
        });
        document.getElementById('btn-bg-green').addEventListener('click', () => {
            bgColorInput.value = "#00ff00";
            renderer.setClearColor(new THREE.Color("#00ff00"), 1.0);
            document.body.style.background = "#00ff00";
            addAppLog("背景色を『緑』に変更しました。");
        });
        document.getElementById('btn-bg-dark').addEventListener('click', () => {
            bgColorInput.value = "#1a1a1a";
            renderer.setClearColor(new THREE.Color("#1a1a1a"), 1.0);
            document.body.style.background = "#1a1a1a";
            addAppLog("背景色を『暗』に変更しました。");
        });

        document.getElementById('btn-screenshot').addEventListener('click', () => {
            renderer.render(scene, camera);
            const snapCanvas = document.createElement('canvas');
            snapCanvas.width = canvasElement.width;
            snapCanvas.height = canvasElement.height;
            const snapCtx = snapCanvas.getContext('2d');
            snapCtx.drawImage(canvasElement, 0, 0);
            drawCreditOverlay(snapCanvas);

            const link = document.createElement('a');
            link.download = `capture_${Date.now()}.png`;
            link.href = snapCanvas.toDataURL('image/png');
            link.click();
            addAppLog("スクリーンショットを保存しました。");
        });

        const recordBtn = document.getElementById('btn-record');
        recordBtn.addEventListener('click', () => {
            if (!isRecording) {
                recordedChunks = [];
                const recordCanvas = document.createElement('canvas');
                recordCanvas.width = canvasElement.width;
                recordCanvas.height = canvasElement.height;
                const rCtx = recordCanvas.getContext('2d');
                
                function drawRecordLoop() {
                    if (!isRecording) return;
                    rCtx.drawImage(canvasElement, 0, 0);
                    drawCreditOverlay(recordCanvas);
                    requestAnimationFrame(drawRecordLoop);
                }

                isRecording = true;
                drawRecordLoop();

                mediaRecorder = new MediaRecorder(recordCanvas.captureStream(30), { mimeType: 'video/webm;codecs=vp9' });
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const link = document.createElement('a');
                    link.download = `movie_${Date.now()}.webm`;
                    link.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/webm' }));
                    link.click();
                    addAppLog("録画ファイルを保存しました。");
                };
                mediaRecorder.start();
                
                recordBtn.innerText = "⏹️ 録画停止";
                recordBtn.classList.add('active');
                addAppLog("画面の録画を開始しました。");
            } else {
                isRecording = false;
                mediaRecorder.stop();
                recordBtn.innerText = "🔴 録画開始";
                recordBtn.classList.remove('active');
            }
        });

        document.getElementById('btn-pip').addEventListener('click', async () => {
            try {
                const pipVideo = document.createElement('video');
                pipVideo.muted = true;
                pipVideo.srcObject = canvasElement.captureStream(30);
                pipVideo.play();
                pipVideo.addEventListener('loadedmetadata', async () => { await pipVideo.requestPictureInPicture(); });
                addAppLog("小窓化（PiP）を起動しました。");
            } catch (e) {}
        });

        document.getElementById('track-target-buttons').addEventListener('click', (e) => {
            if (e.target.classList.contains('btn')) {
                document.querySelectorAll('#track-target-buttons .btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                trackingTarget = e.target.getAttribute('data-target');
                addAppLog(`動かす場所を [${trackingTarget}] に変更しました。`);
            }
        });

        document.getElementById('expression-buttons').addEventListener('click', (e) => {
            if (e.target.classList.contains('btn')) {
                document.querySelectorAll('#expression-buttons .btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentExpression = e.target.getAttribute('data-exp');
                addAppLog(`表情を [${currentExpression}] に固定しました。`);
                
                if (!isOfficialAvatar && currentVrm && currentVrm.blendShapeProxy) {
                    const bp = currentVrm.blendShapeProxy;
                    bp.setValue(THREE.VRMSchema.BlendShapePresetName.Surprised, 0);
                    bp.setValue(THREE.VRMSchema.BlendShapePresetName.Angry, 0);
                    
                    if (currentExpression === "surprised") bp.setValue(THREE.VRMSchema.BlendShapePresetName.Surprised, 1.0);
                    if (currentExpression === "angry") bp.setValue(THREE.VRMSchema.BlendShapePresetName.Angry, 1.0);
                }
            }
        });

        document.getElementById('toggle-video').addEventListener('click', () => {
            const container = document.getElementById('video-container');
            container.style.opacity = container.style.opacity === '0' ? '1' : '0';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initializeSystem();
    </script>
</body>
</html>
